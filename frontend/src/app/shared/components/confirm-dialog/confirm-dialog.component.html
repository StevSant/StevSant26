@if (isOpen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center">
    <!-- Backdrop -->
    <div
      class="absolute inset-0 bg-(--color-overlay-heavy) backdrop-blur-sm"
      (click)="onCancel()"
    ></div>

    <!-- Dialog -->
    <div class="relative card shadow-2xl max-w-md w-full mx-4 animate-fade-in">
      <!-- Icon -->
      <div class="flex justify-center mb-4">
        <div
          class="w-16 h-16 rounded-full flex items-center justify-center"
          [class.bg-(--color-error-bg)]="variant() === 'danger'"
          [class.bg-(--color-warning-bg)]="variant() === 'warning'"
          [class.bg-(--color-info-bg)]="variant() === 'info'"
        >
          @if (variant() === 'danger') {
            <svg
              class="w-8 h-8 text-(--color-error)"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              />
            </svg>
          }
          @if (variant() === 'warning') {
            <svg
              class="w-8 h-8 text-(--color-warning)"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
              />
            </svg>
          }
          @if (variant() === 'info') {
            <svg
              class="w-8 h-8 text-(--color-info)"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
          }
        </div>
      </div>

      <!-- Title -->
      <h3 class="text-xl font-semibold text-(--color-text-primary) text-center mb-2">
        {{ title() }}
      </h3>

      <!-- Message -->
      <p class="text-(--color-text-muted) text-center mb-6">{{ message() }}</p>

      <!-- Actions -->
      <div class="flex gap-3">
        <button type="button" (click)="onCancel()" class="flex-1 btn-secondary">
          {{ cancelText() }}
        </button>
        <button
          type="button"
          (click)="onConfirm()"
          class="flex-1 btn"
          [class.bg-(--color-error)]="variant() === 'danger'"
          [class.hover:bg-(--color-error-hover)]="variant() === 'danger'"
          [class.bg-(--color-warning)]="variant() === 'warning'"
          [class.hover:bg-(--color-warning-hover)]="variant() === 'warning'"
          [class.bg-(--color-accent)]="variant() === 'info'"
          [class.hover:bg-(--color-accent-hover)]="variant() === 'info'"
          [class.text-(--color-text-primary)]="true"
        >
          {{ confirmText() }}
        </button>
      </div>
    </div>
  </div>
}

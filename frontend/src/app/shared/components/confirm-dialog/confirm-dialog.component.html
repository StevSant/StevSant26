@if (isOpen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" (click)="onCancel()"></div>

    <!-- Dialog -->
    <div
      class="relative bg-gray-800 rounded-xl shadow-2xl max-w-md w-full mx-4 p-6 animate-fade-in"
    >
      <!-- Icon -->
      <div class="flex justify-center mb-4">
        <div
          class="w-16 h-16 rounded-full flex items-center justify-center"
          [ngClass]="{
            'bg-red-500/20': variant === 'danger',
            'bg-yellow-500/20': variant === 'warning',
            'bg-blue-500/20': variant === 'info',
          }"
        >
          @if (variant === 'danger') {
            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              />
            </svg>
          }
          @if (variant === 'warning') {
            <svg
              class="w-8 h-8 text-yellow-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
              />
            </svg>
          }
          @if (variant === 'info') {
            <svg
              class="w-8 h-8 text-blue-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
          }
        </div>
      </div>

      <!-- Title -->
      <h3 class="text-xl font-semibold text-white text-center mb-2">{{ title }}</h3>

      <!-- Message -->
      <p class="text-gray-400 text-center mb-6">{{ message }}</p>

      <!-- Actions -->
      <div class="flex gap-3">
        <button
          type="button"
          (click)="onCancel()"
          class="flex-1 px-4 py-2.5 bg-gray-700 hover:bg-gray-600 text-white font-medium rounded-lg transition-colors"
        >
          {{ cancelText }}
        </button>
        <button
          type="button"
          (click)="onConfirm()"
          class="flex-1 px-4 py-2.5 font-medium rounded-lg transition-colors"
          [ngClass]="{
            'bg-red-600 hover:bg-red-700 text-white': variant === 'danger',
            'bg-yellow-600 hover:bg-yellow-700 text-white': variant === 'warning',
            'bg-blue-600 hover:bg-blue-700 text-white': variant === 'info',
          }"
        >
          {{ confirmText }}
        </button>
      </div>
    </div>
  </div>
}

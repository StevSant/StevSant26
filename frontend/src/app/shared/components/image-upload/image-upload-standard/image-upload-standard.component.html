<!-- Standard Upload Area -->
<div
  class="relative border-2 border-dashed border-(--color-border-secondary) rounded-lg p-6 hover:border-(--color-accent) transition-colors cursor-pointer"
  [class.border-(--color-accent)]="isDragging()"
  [class.bg-(--color-info-bg)]="isDragging()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  (click)="fileInput.click()"
>
  <input
    #fileInput
    type="file"
    accept="image/*"
    [multiple]="multiple()"
    class="hidden"
    (change)="onFileSelect($event)"
    [disabled]="uploading()"
  />

  <div class="text-center">
    @if (uploading()) {
      <div class="flex flex-col items-center gap-3">
        <svg class="spinner-lg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        <p class="text-(--color-text-muted)">
          Subiendo imagen{{ uploadProgress() ? ' (' + uploadProgress() + '%)' : '...' }}
        </p>
      </div>
    } @else {
      <span class="material-symbols-outlined mx-auto text-[48px] text-(--color-text-muted)"
        >add_photo_alternate</span
      >
      <p class="mt-2 text-sm text-(--color-text-muted)">
        <span class="text-(--color-accent) font-medium">Haz clic para subir</span> o arrastra y
        suelta
      </p>
      <p class="mt-1 text-xs text-(--color-text-disabled)">PNG, JPG, GIF, WebP hasta 10MB</p>
    }
  </div>
</div>

<!-- Preview for standard mode -->
@if (previewUrl()) {
  <div class="relative rounded-lg overflow-hidden bg-(--color-bg-tertiary) mt-4">
    <img [src]="previewUrl()" [alt]="altText() || 'Preview'" class="w-full h-48 object-cover" />
    <button
      type="button"
      (click)="onRemovePreview($event)"
      class="absolute top-2 right-2 p-1.5 bg-(--color-error) hover:bg-(--color-error-hover) rounded-full text-(--color-text-primary) transition-colors"
    >
      <span class="material-symbols-outlined text-[16px]">close</span>
    </button>
  </div>
}

<!-- Standard Upload Area -->
<div
  class="relative border-2 border-dashed border-(--color-border-secondary) rounded-lg p-6 hover:border-(--color-accent) transition-colors cursor-pointer"
  [class.border-(--color-accent)]="isDragging()"
  [class.bg-(--color-info-bg)]="isDragging()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  (click)="fileInput.click()"
>
  <input
    #fileInput
    type="file"
    accept="image/*"
    [multiple]="multiple()"
    class="hidden"
    (change)="onFileSelect($event)"
    [disabled]="uploading()"
  />

  <div class="text-center">
    @if (uploading()) {
      <div class="flex flex-col items-center gap-3">
        <svg class="spinner-lg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        <p class="text-(--color-text-muted)">
          Subiendo imagen{{ uploadProgress() ? ' (' + uploadProgress() + '%)' : '...' }}
        </p>
      </div>
    } @else {
      <svg
        class="mx-auto h-12 w-12 text-(--color-text-muted)"
        stroke="currentColor"
        fill="none"
        viewBox="0 0 48 48"
      >
        <path
          d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <p class="mt-2 text-sm text-(--color-text-muted)">
        <span class="text-(--color-accent) font-medium">Haz clic para subir</span> o arrastra y
        suelta
      </p>
      <p class="mt-1 text-xs text-(--color-text-disabled)">PNG, JPG, GIF, WebP hasta 10MB</p>
    }
  </div>
</div>

<!-- Preview for standard mode -->
@if (previewUrl()) {
  <div class="relative rounded-lg overflow-hidden bg-(--color-bg-tertiary) mt-4">
    <img [src]="previewUrl()" [alt]="altText() || 'Preview'" class="w-full h-48 object-cover" />
    <button
      type="button"
      (click)="onRemovePreview($event)"
      class="absolute top-2 right-2 p-1.5 bg-(--color-error) hover:bg-(--color-error-hover) rounded-full text-(--color-text-primary) transition-colors"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
  </div>
}

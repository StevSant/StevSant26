<div class="flex flex-col gap-4">
  <div class="relative">
    @if (currentImageUrl()) {
      <!-- Banner Image Preview -->
      <div class="relative group">
        <img
          [src]="currentImageUrl()"
          [alt]="altText() || 'Banner'"
          class="w-full h-48 md:h-56 rounded-xl object-cover border-2 border-(--color-border-secondary) shadow-lg"
        />
        <!-- Overlay with actions on hover -->
        <div
          class="absolute inset-0 rounded-xl bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2"
        >
          <!-- View full image button -->
          <button
            type="button"
            (click)="onViewImage($event)"
            class="p-2 bg-(--color-accent) hover:bg-(--color-accent-hover) rounded-full text-white transition-colors"
            title="Ver imagen completa"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"
              />
            </svg>
          </button>
          <!-- Change image button -->
          <button
            type="button"
            (click)="fileInput.click()"
            class="p-2 bg-(--color-bg-secondary) hover:bg-(--color-bg-tertiary) rounded-full text-(--color-text-primary) transition-colors"
            title="Cambiar banner"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"
              />
            </svg>
          </button>
          <!-- Remove image button -->
          <button
            type="button"
            (click)="onRemoveImage($event)"
            class="p-2 bg-(--color-error) hover:bg-(--color-error-hover) rounded-full text-white transition-colors"
            title="Eliminar banner"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
      </div>
    } @else {
      <!-- Empty Banner Placeholder -->
      <div
        class="w-full h-48 md:h-56 rounded-xl border-2 border-dashed border-(--color-border-secondary) hover:border-(--color-accent) transition-colors cursor-pointer flex flex-col items-center justify-center gap-3 bg-(--color-bg-tertiary)"
        [class.border-(--color-accent)]="isDragging()"
        [class.bg-(--color-info-bg)]="isDragging()"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)"
        (click)="fileInput.click()"
      >
        @if (uploading()) {
          <svg
            class="spinner-lg"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
        } @else {
          <svg
            class="w-12 h-12 text-(--color-text-muted)"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
            />
          </svg>
          <p class="text-sm text-(--color-text-muted)">
            <span class="text-(--color-accent) font-medium">Haz clic</span> o arrastra una imagen de
            banner
          </p>
          <p class="text-xs text-(--color-text-disabled)">Recomendado: 1500 x 500px</p>
        }
      </div>
    }
  </div>

  <!-- Hidden file input for banner -->
  <input
    #fileInput
    type="file"
    accept="image/*"
    class="hidden"
    (change)="onFileSelect($event)"
    [disabled]="uploading()"
  />
</div>

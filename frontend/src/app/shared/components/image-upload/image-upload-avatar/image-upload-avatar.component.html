<div class="flex flex-col items-center gap-4">
  <!-- Circular Avatar Preview/Placeholder -->
  <div class="relative">
    @if (currentImageUrl()) {
      <!-- Avatar Image -->
      <div class="relative group">
        <img
          [src]="currentImageUrl()"
          [alt]="altText() || 'Avatar'"
          class="w-32 h-32 rounded-full object-cover border-4 border-(--color-border-secondary) shadow-lg"
        />
        <!-- Overlay with actions on hover -->
        <div
          class="absolute inset-0 rounded-full bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2"
        >
          <!-- View full image button -->
          <button
            type="button"
            (click)="onViewImage($event)"
            class="p-2 bg-(--color-accent) hover:bg-(--color-accent-hover) rounded-full text-white transition-colors"
            title="Ver imagen completa"
          >
            <span class="material-symbols-outlined text-[20px]">zoom_in</span>
          </button>
          <!-- Change image button -->
          <button
            type="button"
            (click)="fileInput.click()"
            class="p-2 bg-(--color-bg-secondary) hover:bg-(--color-bg-tertiary) rounded-full text-(--color-text-primary) transition-colors"
            title="Cambiar imagen"
          >
            <span class="material-symbols-outlined text-[20px]">photo_camera</span>
          </button>
          <!-- Remove image button -->
          <button
            type="button"
            (click)="onRemoveImage($event)"
            class="p-2 bg-(--color-error) hover:bg-(--color-error-hover) rounded-full text-white transition-colors"
            title="Eliminar imagen"
          >
            <span class="material-symbols-outlined text-[20px]">close</span>
          </button>
        </div>
      </div>
    } @else {
      <!-- Empty Avatar Placeholder -->
      <div
        class="w-32 h-32 rounded-full border-4 border-dashed border-(--color-border-secondary) hover:border-(--color-accent) transition-colors cursor-pointer flex items-center justify-center bg-(--color-bg-tertiary)"
        [class.border-(--color-accent)]="isDragging()"
        [class.bg-(--color-info-bg)]="isDragging()"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)"
        (click)="fileInput.click()"
      >
        @if (uploading()) {
          <svg
            class="spinner-lg"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
        } @else {
          <span class="material-symbols-outlined text-[40px] text-(--color-text-muted)">person</span>
        }
      </div>
    }
  </div>

  <!-- Upload hint text -->
  @if (!currentImageUrl() && !uploading()) {
    <p class="text-sm text-(--color-text-muted) text-center">
      <span class="text-(--color-accent) font-medium cursor-pointer" (click)="fileInput.click()"
        >Haz clic</span
      >
      o arrastra una imagen
    </p>
  }

  <!-- Hidden file input -->
  <input
    #fileInput
    type="file"
    accept="image/*"
    class="hidden"
    (change)="onFileSelect($event)"
    [disabled]="uploading()"
  />
</div>

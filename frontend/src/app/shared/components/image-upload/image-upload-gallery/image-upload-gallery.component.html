<!-- Uploaded Images Gallery -->
@if (uploadedImages().length > 0) {
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    @for (img of uploadedImages(); track img.path) {
      <div class="relative group rounded-lg overflow-hidden bg-(--color-bg-tertiary)">
        <img [src]="img.url" [alt]="img.alt || 'Uploaded image'" class="w-full h-32 object-cover" />
        <div
          class="absolute inset-0 bg-(--color-overlay) opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"
        >
          <button
            type="button"
            (click)="onRemoveUploaded(img.path, $event)"
            class="p-2 bg-(--color-error) hover:bg-(--color-error-hover) rounded-full text-(--color-text-primary) transition-colors"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              />
            </svg>
          </button>
        </div>
      </div>
    }
  </div>
}

<!-- Existing Images Gallery (from database) -->
@if (existingImages().length > 0) {
  <div class="space-y-2">
    <p class="text-sm text-(--color-text-muted)">Imágenes guardadas:</p>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      @for (img of existingImages(); track img.id) {
        <div class="relative group rounded-lg overflow-hidden bg-(--color-bg-tertiary)">
          <img
            [src]="img.url"
            [alt]="img.alt_text || 'Saved image'"
            class="w-full h-32 object-cover"
          />
          <div
            class="absolute inset-0 bg-(--color-overlay) opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"
          >
            <button
              type="button"
              (click)="onRemoveExisting(img.id, $event)"
              class="p-2 bg-(--color-error) hover:bg-(--color-error-hover) rounded-full text-(--color-text-primary) transition-colors"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                />
              </svg>
            </button>
          </div>
        </div>
      }
    </div>
  </div>
}

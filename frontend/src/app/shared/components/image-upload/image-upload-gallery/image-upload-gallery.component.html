<!-- Uploaded Images Gallery -->
@if (uploadedImages().length > 0) {
  <div
    cdkDropList
    cdkDropListOrientation="mixed"
    (cdkDropListDropped)="onDropUploaded($event)"
    class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
  >
    @for (img of uploadedImages(); track img.path; let i = $index) {
      <div
        cdkDrag
        class="relative group rounded-lg overflow-hidden bg-(--color-bg-tertiary) cursor-grab active:cursor-grabbing"
      >
        <!-- Drag preview -->
        <div
          *cdkDragPlaceholder
          class="w-full h-32 rounded-lg border-2 border-dashed border-(--color-accent) bg-(--color-accent)/10"
        ></div>
        <!-- Position badge -->
        <div
          class="absolute top-2 left-2 z-10 w-6 h-6 rounded-full bg-black/60 text-white text-xs font-bold flex items-center justify-center backdrop-blur-sm"
        >
          {{ i + 1 }}
        </div>
        <img [src]="img.url" [alt]="img.alt || 'Uploaded image'" class="w-full h-32 object-cover" />
        <div
          class="absolute inset-0 bg-(--color-overlay) opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2"
        >
          <!-- Drag handle indicator -->
          <div
            cdkDragHandle
            class="p-2 bg-(--color-bg-secondary)/80 rounded-full text-(--color-text-primary) cursor-grab active:cursor-grabbing"
          >
            <span class="material-symbols-outlined text-[20px]">drag_indicator</span>
          </div>
          <button
            type="button"
            (click)="onRemoveUploaded(img.path, $event)"
            class="p-2 bg-(--color-error) hover:bg-(--color-error-hover) rounded-full text-(--color-text-primary) transition-colors"
          >
            <span class="material-symbols-outlined text-[20px]">delete</span>
          </button>
        </div>
      </div>
    }
  </div>
}

<!-- Existing Images Gallery (from database) -->
@if (existingImages().length > 0) {
  <div class="space-y-2">
    <p class="text-sm text-(--color-text-muted)">Imágenes guardadas:</p>
    <div
      cdkDropList
      cdkDropListOrientation="mixed"
      (cdkDropListDropped)="onDropExisting($event)"
      class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
    >
      @for (img of existingImages(); track img.id; let i = $index) {
        <div
          cdkDrag
          class="relative group rounded-lg overflow-hidden bg-(--color-bg-tertiary) cursor-grab active:cursor-grabbing"
        >
          <!-- Drag preview -->
          <div
            *cdkDragPlaceholder
            class="w-full h-32 rounded-lg border-2 border-dashed border-(--color-accent) bg-(--color-accent)/10"
          ></div>
          <!-- Position badge -->
          <div
            class="absolute top-2 left-2 z-10 w-6 h-6 rounded-full bg-black/60 text-white text-xs font-bold flex items-center justify-center backdrop-blur-sm"
          >
            {{ i + 1 }}
          </div>
          <img
            [src]="img.url"
            [alt]="img.alt_text || 'Saved image'"
            class="w-full h-32 object-cover"
          />
          <div
            class="absolute inset-0 bg-(--color-overlay) opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2"
          >
            <!-- Drag handle indicator -->
            <div
              cdkDragHandle
              class="p-2 bg-(--color-bg-secondary)/80 rounded-full text-(--color-text-primary) cursor-grab active:cursor-grabbing"
            >
              <span class="material-symbols-outlined text-[20px]">drag_indicator</span>
            </div>
            <button
              type="button"
              (click)="onRemoveExisting(img.id, $event)"
              class="p-2 bg-(--color-error) hover:bg-(--color-error-hover) rounded-full text-(--color-text-primary) transition-colors"
            >
              <span class="material-symbols-outlined text-[20px]">delete</span>
            </button>
          </div>
        </div>
      }
    </div>
  </div>
}

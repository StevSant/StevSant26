<div
  class="flex items-center justify-between p-3 bg-[var(--color-bg-tertiary)] rounded-lg border border-[var(--color-border-secondary)] hover:border-[var(--color-accent)] transition-colors"
>
  <div class="flex items-center gap-3">
    <!-- Skill Icon -->
    <div
      class="w-10 h-10 rounded-full bg-[var(--color-accent)]/10 flex items-center justify-center"
    >
      <svg
        class="w-5 h-5 text-[var(--color-accent)]"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
        />
      </svg>
    </div>

    <!-- Skill Info -->
    <div>
      <p class="font-medium text-[var(--color-text-primary)]">{{ displayName() }}</p>
      <div class="flex items-center gap-2 text-sm text-[var(--color-text-muted)]">
        @if (usage().level) {
          <span class="text-amber-500">{{ getLevelStars(usage().level) }}</span>
        }
        @if (usage().started_at) {
          <span>{{ usage().started_at }}</span>
          @if (usage().ended_at) {
            <span>→ {{ usage().ended_at }}</span>
          }
        }
      </div>
    </div>
  </div>

  <!-- Actions -->
  <button
    type="button"
    (click)="remove.emit(usage())"
    class="p-2 text-[var(--color-text-muted)] hover:text-[var(--color-error)] hover:bg-[var(--color-error)]/10 rounded-lg transition-colors"
    [title]="'common.delete' | translate"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
      />
    </svg>
  </button>
</div>

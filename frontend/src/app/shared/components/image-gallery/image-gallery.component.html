@if (images().length > 0) {
  <div class="mb-10" tabindex="0" class="outline-none">
    @if (showTitle()) {
      <h2 class="text-xs uppercase tracking-[0.2em] text-(--color-text-muted) mb-4 font-medium">
        {{ 'portfolio.gallery' | translate }}
      </h2>
    }

    <!-- Main image with navigation arrows -->
    <div
      class="relative rounded-lg overflow-hidden mb-3 bg-(--color-bg-tertiary) group/gallery"
      tabindex="0"
    >
      <img
        [src]="currentImage()?.url"
        [alt]="currentImage()?.alt_text || fallbackAlt()"
        class="w-full max-h-125 object-contain"
      />

      <!-- Navigation arrows (visible on hover or focus, only when multiple images) -->
      @if (hasMultiple()) {
        <!-- Previous -->
        <button
          type="button"
          (click)="prevImage(); $event.stopPropagation()"
          class="absolute left-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-black/50 text-white flex items-center justify-center opacity-0 group-hover/gallery:opacity-100 focus:opacity-100 transition-opacity duration-200 hover:bg-black/70 backdrop-blur-sm"
          aria-label="Previous image"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 19l-7-7 7-7"
            />
          </svg>
        </button>

        <!-- Next -->
        <button
          type="button"
          (click)="nextImage(); $event.stopPropagation()"
          class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-black/50 text-white flex items-center justify-center opacity-0 group-hover/gallery:opacity-100 focus:opacity-100 transition-opacity duration-200 hover:bg-black/70 backdrop-blur-sm"
          aria-label="Next image"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"
            />
          </svg>
        </button>

        <!-- Image counter -->
        <span
          class="absolute bottom-3 right-3 px-2.5 py-1 text-xs font-medium rounded-full bg-black/50 text-white backdrop-blur-sm"
        >
          {{ selectedIndex() + 1 }} / {{ images().length }}
        </span>
      }
    </div>

    <!-- Thumbnails -->
    @if (hasMultiple()) {
      <div class="flex gap-2 overflow-x-auto pb-2">
        @for (img of images(); track img.id; let i = $index) {
          <button
            type="button"
            (click)="selectImage(i)"
            class="shrink-0 w-20 h-20 rounded-md overflow-hidden border-2 transition-all"
            [class]="
              i === selectedIndex()
                ? 'border-(--color-accent) ring-2 ring-(--color-accent)/30'
                : 'border-(--color-border-primary) opacity-60 hover:opacity-100'
            "
          >
            <img [src]="img.url" [alt]="img.alt_text || ''" class="w-full h-full object-cover" />
          </button>
        }
      </div>
    }
  </div>
}

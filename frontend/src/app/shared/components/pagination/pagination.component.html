@if (totalItems() > pageSize()) {
  <div class="flex flex-col sm:flex-row items-center justify-between gap-3 pt-4">
    <p class="text-sm text-[var(--color-text-muted)]">
      {{ 'pagination.showing' | translate }} {{ startItem() }}–{{ endItem() }}
      {{ 'pagination.of' | translate }} {{ totalItems() }}
    </p>
    <nav class="flex items-center gap-1">
      <button
        (click)="previousPage()"
        [disabled]="currentPage() <= 1"
        class="p-1.5 rounded-lg text-[var(--color-text-muted)] hover:bg-[var(--color-bg-secondary)] disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
      >
        <mat-icon class="text-[18px]">chevron_left</mat-icon>
      </button>

      @for (page of visiblePages(); track $index) {
        @if (page === -1) {
          <span class="px-2 text-sm text-[var(--color-text-muted)]">…</span>
        } @else {
          <button
            (click)="goToPage(page)"
            [class]="
              page === currentPage()
                ? 'w-8 h-8 rounded-lg text-sm font-medium bg-[var(--color-accent)] text-[var(--btn-primary-text)]'
                : 'w-8 h-8 rounded-lg text-sm font-medium text-[var(--color-text-muted)] hover:bg-[var(--color-bg-secondary)] transition-colors'
            "
          >
            {{ page }}
          </button>
        }
      }

      <button
        (click)="nextPage()"
        [disabled]="currentPage() >= totalPages()"
        class="p-1.5 rounded-lg text-[var(--color-text-muted)] hover:bg-[var(--color-bg-secondary)] disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
      >
        <mat-icon class="text-[18px]">chevron_right</mat-icon>
      </button>
    </nav>
  </div>
}

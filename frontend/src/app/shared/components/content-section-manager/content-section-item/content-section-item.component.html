<div
  class="flex items-center justify-between p-3 bg-[var(--color-bg-tertiary)] rounded-lg border border-[var(--color-border-primary)] hover:border-[var(--color-accent)]/30 transition-colors"
>
  <div class="flex items-center gap-3 min-w-0 flex-1">
    <!-- Drag Handle -->
    @if (showDragHandle()) {
      <div
        class="cursor-grab active:cursor-grabbing text-[var(--color-text-muted)] hover:text-[var(--color-text-primary)] shrink-0"
        cdkDragHandle
      >
        <span class="material-symbols-outlined text-[20px]">drag_indicator</span>
      </div>
    }

    @if (isIconMaterial) {
      <span
        class="material-symbols-outlined text-[22px] shrink-0 align-middle"
        [attr.aria-hidden]="true"
        >{{ sectionIcon }}</span
      >
    } @else {
      <span class="text-lg shrink-0">{{ sectionIcon }}</span>
    }
    <div class="min-w-0">
      <p class="text-sm font-medium text-[var(--color-text-primary)] truncate">
        {{ displayTitle() || sectionKeyLabel }}
      </p>
      <p class="text-xs text-[var(--color-text-muted)]">
        {{ sectionKeyLabel }}
      </p>
    </div>
  </div>

  <div class="flex items-center gap-1 shrink-0">
    <!-- Edit button -->
    <button
      type="button"
      class="p-1.5 text-[var(--color-text-muted)] hover:text-[var(--color-accent)] transition-colors"
      (click)="edit.emit(section())"
      [title]="'common.edit' | translate"
    >
      <span class="material-symbols-outlined text-[16px]">edit</span>
    </button>

    <!-- Remove button -->
    <button
      type="button"
      class="p-1.5 text-[var(--color-text-muted)] hover:text-red-500 transition-colors"
      (click)="remove.emit(section())"
      [title]="'common.delete' | translate"
    >
      <span class="material-symbols-outlined text-[16px]">delete</span>
    </button>
  </div>
</div>

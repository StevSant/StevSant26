<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-4 mb-6">
    <a
      routerLink="/dashboard/skill-usages"
      class="p-2 text-gray-400 hover:text-white hover:bg-gray-700 rounded-lg transition-colors"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <h1 class="text-2xl font-bold text-white">
      {{ isNew ? 'Nuevo Uso de Habilidad' : 'Editar Uso de Habilidad' }}
    </h1>
  </div>

  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <svg
        class="animate-spin h-8 w-8 text-blue-500"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    </div>
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="bg-gray-800 rounded-xl p-6 space-y-6">
        <h2 class="text-lg font-semibold text-white">Información del Vínculo</h2>

        <div>
          <label for="skill_id" class="block text-sm font-medium text-gray-300 mb-2"
            >Habilidad <span class="text-red-500">*</span></label
          >
          <select
            id="skill_id"
            name="skill_id"
            [(ngModel)]="formData.skill_id"
            required
            class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
          >
            <option [ngValue]="0" disabled>Selecciona una habilidad</option>
            @for (skill of skills(); track skill.id) {
              <option [ngValue]="skill.id">{{ skill.name }}</option>
            }
          </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="source_type" class="block text-sm font-medium text-gray-300 mb-2"
              >Tipo de Fuente <span class="text-red-500">*</span></label
            >
            <select
              id="source_type"
              name="source_type"
              [(ngModel)]="formData.source_type"
              required
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            >
              <option value="project">Proyecto</option>
              <option value="experience">Experiencia</option>
              <option value="competition">Competencia</option>
              <option value="event">Evento</option>
            </select>
          </div>
          <div>
            <label for="source_id" class="block text-sm font-medium text-gray-300 mb-2"
              >ID de Fuente <span class="text-red-500">*</span></label
            >
            <input
              type="number"
              id="source_id"
              name="source_id"
              [(ngModel)]="formData.source_id"
              required
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
              placeholder="ID"
            />
          </div>
        </div>

        <div>
          <label for="level" class="block text-sm font-medium text-gray-300 mb-2"
            >Nivel de Dominio (1-5)</label
          >
          <div class="flex items-center gap-2">
            @for (i of [1, 2, 3, 4, 5]; track i) {
              <button
                type="button"
                (click)="setLevel(i)"
                class="p-1 transition-colors"
                [class.text-yellow-500]="formData.level !== null && i <= formData.level"
                [class.text-gray-600]="formData.level === null || i > formData.level"
              >
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                  />
                </svg>
              </button>
            }
            @if (formData.level) {
              <button
                type="button"
                (click)="setLevel(null)"
                class="ml-2 text-gray-400 hover:text-white text-sm"
              >
                Limpiar
              </button>
            }
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="started_at" class="block text-sm font-medium text-gray-300 mb-2"
              >Fecha de Inicio</label
            >
            <input
              type="date"
              id="started_at"
              name="started_at"
              [(ngModel)]="formData.started_at"
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            />
          </div>
          <div>
            <label for="ended_at" class="block text-sm font-medium text-gray-300 mb-2"
              >Fecha de Fin</label
            >
            <input
              type="date"
              id="ended_at"
              name="ended_at"
              [(ngModel)]="formData.ended_at"
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            />
          </div>
        </div>

        <div>
          <label for="description" class="block text-sm font-medium text-gray-300 mb-2"
            >Descripción</label
          >
          <textarea
            id="description"
            name="description"
            [(ngModel)]="formData.description"
            rows="3"
            class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none"
            placeholder="Describe cómo usaste esta habilidad..."
          ></textarea>
        </div>
      </div>

      @if (error()) {
        <div class="bg-red-500/10 border border-red-500/50 rounded-lg p-4">
          <p class="text-red-400 text-sm">{{ error() }}</p>
        </div>
      }

      <div class="flex justify-end gap-3">
        <a
          routerLink="/dashboard/skill-usages"
          class="px-6 py-2.5 bg-gray-700 hover:bg-gray-600 text-white font-medium rounded-lg transition-colors"
          >Cancelar</a
        >
        <button
          type="submit"
          [disabled]="saving()"
          class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-600/50 disabled:cursor-not-allowed text-white font-medium rounded-lg transition-colors flex items-center gap-2"
        >
          @if (saving()) {
            <svg
              class="animate-spin h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>Guardando...</span>
          } @else {
            <span>{{ isNew ? 'Crear Vínculo' : 'Guardar Cambios' }}</span>
          }
        </button>
      </div>
    </form>
  }
</div>

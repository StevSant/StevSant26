<div class="max-w-2xl mx-auto">
  <!-- Loading State -->
  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <svg class="spinner-lg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    </div>
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Profile Card -->
      <div class="card space-y-6">
        <h2 class="text-xl font-semibold text-[var(--color-text-primary)] flex items-center gap-2">
          <svg
            class="w-6 h-6 text-[var(--color-accent)]"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
          Información Personal
        </h2>

        <!-- Avatar Upload -->
        <div>
          <label class="label">Foto de Perfil</label>
          <app-image-upload
            folder="profile"
            [altText]="'Foto de perfil'"
            [isAvatar]="true"
            [existingImageUrl]="profile?.avatar_url || null"
            (uploaded)="onAvatarUploaded($event)"
          />
        </div>

        <!-- Name Fields -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="first_name" class="label">Nombre</label>
            <input
              type="text"
              id="first_name"
              name="first_name"
              [(ngModel)]="formData.first_name"
              class="input"
              placeholder="Tu nombre"
            />
          </div>
          <div>
            <label for="last_name" class="label">Apellido</label>
            <input
              type="text"
              id="last_name"
              name="last_name"
              [(ngModel)]="formData.last_name"
              class="input"
              placeholder="Tu apellido"
            />
          </div>
        </div>

        <!-- Nickname -->
        <div>
          <label for="nickname" class="label">Apodo / Nombre de usuario</label>
          <input
            type="text"
            id="nickname"
            name="nickname"
            [(ngModel)]="formData.nickname"
            class="input"
            placeholder="@tunickname"
          />
        </div>

        <!-- About -->
        <div>
          <label for="about" class="label">Acerca de mí</label>
          <textarea
            id="about"
            name="about"
            [(ngModel)]="formData.about"
            rows="5"
            class="input-textarea"
            placeholder="Cuéntanos sobre ti, tu experiencia y tus intereses..."
          ></textarea>
        </div>
      </div>

      <!-- Messages -->
      @if (error()) {
        <div class="alert-error">
          <p>{{ error() }}</p>
        </div>
      }

      @if (success()) {
        <div class="alert-success">
          <p>{{ success() }}</p>
        </div>
      }

      <!-- Actions -->
      <div class="flex justify-end gap-3">
        <button type="button" (click)="resetForm()" class="btn-secondary px-6">Cancelar</button>
        <button type="submit" [disabled]="saving()" class="btn-primary px-6">
          @if (saving()) {
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>Guardando...</span>
          } @else {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
            <span>Guardar cambios</span>
          }
        </button>
      </div>
    </form>
  }
</div>

<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-4 mb-6">
    <a
      routerLink="/dashboard/competitions"
      class="p-2 text-[var(--color-text-muted)] hover:text-[var(--color-text-primary)] hover:bg-[var(--color-bg-tertiary)] rounded-lg transition-colors"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <h1 class="text-2xl font-bold text-[var(--color-text-primary)]">
      {{ isNew ? 'Nueva Competencia' : 'Editar Competencia' }}
    </h1>
  </div>

  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <svg class="spinner-lg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    </div>
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="card space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
          Información de la Competencia
        </h2>

        <div>
          <label for="name" class="label"
            >Nombre <span class="text-[var(--color-error)]">*</span></label
          >
          <input
            type="text"
            id="name"
            name="name"
            [(ngModel)]="formData.name"
            required
            class="input"
            placeholder="Nombre de la competencia"
          />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="organizer" class="label">Organizador</label>
            <input
              type="text"
              id="organizer"
              name="organizer"
              [(ngModel)]="formData.organizer"
              class="input"
              placeholder="Empresa u organización"
            />
          </div>
          <div>
            <label for="date" class="label">Fecha</label>
            <input type="date" id="date" name="date" [(ngModel)]="formData.date" class="input" />
          </div>
        </div>

        <div>
          <label for="result" class="label">Resultado</label>
          <input
            type="text"
            id="result"
            name="result"
            [(ngModel)]="formData.result"
            class="input"
            placeholder="Ej: 1er lugar, Finalista, Mención honorífica"
          />
        </div>

        <div>
          <label for="description" class="label">Descripción</label>
          <textarea
            id="description"
            name="description"
            [(ngModel)]="formData.description"
            rows="4"
            class="input-textarea"
            placeholder="Describe la competencia y tu participación..."
          ></textarea>
        </div>
      </div>

      <div class="card space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">Imágenes</h2>
        <app-image-upload
          folder="competitions"
          [multiple]="true"
          [sourceType]="'competition'"
          [sourceId]="currentId"
          (uploaded)="onImageUploaded($event)"
        />
      </div>

      @if (error()) {
        <div class="alert-error">
          <p class="text-sm">{{ error() }}</p>
        </div>
      }

      <div class="flex justify-end gap-3">
        <a routerLink="/dashboard/competitions" class="btn-secondary">Cancelar</a>
        <button type="submit" [disabled]="saving()" class="btn-primary">
          @if (saving()) {
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>Guardando...</span>
          } @else {
            <span>{{ isNew ? 'Crear Competencia' : 'Guardar Cambios' }}</span>
          }
        </button>
      </div>
    </form>
  }
</div>

<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-4 mb-6">
    <a
      routerLink="/dashboard/skills"
      class="p-2 text-[var(--color-text-muted)] hover:text-[var(--color-text-primary)] hover:bg-[var(--color-bg-tertiary)] rounded-lg transition-colors"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <h1 class="text-2xl font-bold text-[var(--color-text-primary)]">
      {{ isNew ? 'Nueva Habilidad' : 'Editar Habilidad' }}
    </h1>
  </div>

  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <svg class="spinner-lg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    </div>
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="card space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
          Información de la Habilidad
        </h2>

        <div>
          <label for="name" class="label"
            >Nombre <span class="text-[var(--color-error)]">*</span></label
          >
          <input
            type="text"
            id="name"
            name="name"
            [(ngModel)]="formData.name"
            required
            class="input"
            placeholder="Ej: TypeScript, Angular, Python..."
          />
        </div>

        <div>
          <label for="skill_category_id" class="label">Categoría</label>
          <select
            id="skill_category_id"
            name="skill_category_id"
            [(ngModel)]="formData.skill_category_id"
            class="input"
          >
            <option [ngValue]="null">Sin categoría</option>
            @for (cat of categories(); track cat.id) {
              <option [ngValue]="cat.id">{{ cat.name }}</option>
            }
          </select>
        </div>

        <div>
          <label for="description" class="label">Descripción</label>
          <textarea
            id="description"
            name="description"
            [(ngModel)]="formData.description"
            rows="4"
            class="input-textarea"
            placeholder="Describe tu experiencia con esta habilidad..."
          ></textarea>
        </div>
      </div>

      @if (error()) {
        <div class="alert-error">
          <p class="text-sm">{{ error() }}</p>
        </div>
      }

      <div class="flex justify-end gap-3">
        <a routerLink="/dashboard/skills" class="btn-secondary">Cancelar</a>
        <button type="submit" [disabled]="saving()" class="btn-primary">
          @if (saving()) {
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>Guardando...</span>
          } @else {
            <span>{{ isNew ? 'Crear Habilidad' : 'Guardar Cambios' }}</span>
          }
        </button>
      </div>
    </form>
  }
</div>

<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-4 mb-6">
    <a
      routerLink="/dashboard/experiences"
      class="p-2 text-gray-400 hover:text-white hover:bg-gray-700 rounded-lg transition-colors"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <h1 class="text-2xl font-bold text-white">
      {{ isNew ? 'Nueva Experiencia' : 'Editar Experiencia' }}
    </h1>
  </div>

  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <svg
        class="animate-spin h-8 w-8 text-blue-500"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    </div>
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="bg-gray-800 rounded-xl p-6 space-y-6">
        <h2 class="text-lg font-semibold text-white">Información de la Experiencia</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="company" class="block text-sm font-medium text-gray-300 mb-2"
              >Empresa <span class="text-red-500">*</span></label
            >
            <input
              type="text"
              id="company"
              name="company"
              [(ngModel)]="formData.company"
              required
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
              placeholder="Nombre de la empresa"
            />
          </div>
          <div>
            <label for="role" class="block text-sm font-medium text-gray-300 mb-2"
              >Rol <span class="text-red-500">*</span></label
            >
            <input
              type="text"
              id="role"
              name="role"
              [(ngModel)]="formData.role"
              required
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
              placeholder="Tu cargo o posición"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="start_date" class="block text-sm font-medium text-gray-300 mb-2"
              >Fecha de Inicio</label
            >
            <input
              type="date"
              id="start_date"
              name="start_date"
              [(ngModel)]="formData.start_date"
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            />
          </div>
          <div>
            <label for="end_date" class="block text-sm font-medium text-gray-300 mb-2"
              >Fecha de Fin</label
            >
            <input
              type="date"
              id="end_date"
              name="end_date"
              [(ngModel)]="formData.end_date"
              class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            />
            <p class="text-xs text-gray-500 mt-1">Deja vacío si es tu empleo actual</p>
          </div>
        </div>

        <div>
          <label for="description" class="block text-sm font-medium text-gray-300 mb-2"
            >Descripción</label
          >
          <textarea
            id="description"
            name="description"
            [(ngModel)]="formData.description"
            rows="4"
            class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none"
            placeholder="Describe tus responsabilidades y logros..."
          ></textarea>
        </div>
      </div>

      <div class="bg-gray-800 rounded-xl p-6 space-y-6">
        <h2 class="text-lg font-semibold text-white">Imágenes</h2>
        <app-image-upload
          folder="experiences"
          [multiple]="true"
          [sourceType]="'experience'"
          [sourceId]="currentId"
          (uploaded)="onImageUploaded($event)"
        />
      </div>

      @if (error()) {
        <div class="bg-red-500/10 border border-red-500/50 rounded-lg p-4">
          <p class="text-red-400 text-sm">{{ error() }}</p>
        </div>
      }

      <div class="flex justify-end gap-3">
        <a
          routerLink="/dashboard/experiences"
          class="px-6 py-2.5 bg-gray-700 hover:bg-gray-600 text-white font-medium rounded-lg transition-colors"
          >Cancelar</a
        >
        <button
          type="submit"
          [disabled]="saving()"
          class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-600/50 disabled:cursor-not-allowed text-white font-medium rounded-lg transition-colors flex items-center gap-2"
        >
          @if (saving()) {
            <svg
              class="animate-spin h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>Guardando...</span>
          } @else {
            <span>{{ isNew ? 'Crear Experiencia' : 'Guardar Cambios' }}</span>
          }
        </button>
      </div>
    </form>
  }
</div>

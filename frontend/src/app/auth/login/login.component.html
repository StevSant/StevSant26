<div class="min-h-screen flex items-center justify-center bg-(--color-bg-primary) relative">
  <!-- Language Selector -->
  <div class="absolute top-4 right-4">
    <app-language-selector />
  </div>

  <div class="max-w-md w-full mx-4">
    <!-- Logo/Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-(--color-text-primary)">
        {{ 'dashboard.title' | translate }}
      </h1>
      <p class="text-(--color-text-muted) mt-2">
        {{ 'auth.signInToContinue' | translate }}
      </p>
    </div>

    <!-- Login Card -->
    <div class="card shadow-2xl p-8">
      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Email Field -->
        <div>
          <label for="email" class="label">{{ 'auth.email' | translate }}</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            required
            class="input"
            placeholder="tu@email.com"
            [disabled]="loading()"
          />
        </div>

        <!-- Password Field -->
        <div>
          <label for="password" class="label">{{ 'auth.password' | translate }}</label>
          <div class="relative">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              id="password"
              name="password"
              [(ngModel)]="password"
              required
              class="input pr-10"
              placeholder="••••••••"
              [disabled]="loading()"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-0 flex items-center pr-3 text-(--color-text-muted) hover:text-(--color-text-primary) transition-colors"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              @if (showPassword()) {
                <!-- Eye Off Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                  />
                </svg>
              } @else {
                <!-- Eye Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Error Message -->
        @if (error()) {
          <div class="alert-error">
            <p>{{ error() }}</p>
          </div>
        }

        <!-- Submit Button -->
        <button type="submit" [disabled]="loading()" class="w-full btn-primary py-3">
          @if (loading()) {
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>{{ 'common.loading' | translate }}</span>
          } @else {
            <span>{{ 'auth.login' | translate }}</span>
          }
        </button>
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-(--color-text-disabled) text-sm mt-8">
      {{ 'auth.welcomeBack' | translate }}
    </p>
  </div>
</div>

<div class="min-h-screen bg-(--color-bg-primary) flex">
  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-50 w-64 bg-(--color-bg-secondary) transform transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-auto"
    [class.-translate-x-full]="!sidebarOpen()"
    [class.translate-x-0]="sidebarOpen()"
  >
    <div class="flex flex-col h-full">
      <!-- Logo -->
      <div
        class="flex items-center justify-between h-16 px-6 border-b border-(--color-border-primary)"
      >
        <h1 class="text-xl font-bold text-(--color-text-primary)">
          {{ 'dashboard.title' | translate }}
        </h1>
        <button
          (click)="toggleSidebar()"
          class="lg:hidden text-(--color-text-muted) hover:text-(--color-text-primary)"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 overflow-y-auto py-4">
        <ul class="space-y-1 px-3">
          @for (item of navItems; track item.path) {
            <li>
              <a
                [routerLink]="item.path"
                routerLinkActive="nav-item-active"
                class="nav-item"
                (click)="closeSidebarOnMobile()"
              >
                <span [innerHTML]="item.icon | safeHtml" class="w-5 h-5"></span>
                <span>{{ item.labelKey | translate }}</span>
              </a>
            </li>
          }
        </ul>
      </nav>

      <!-- User Section -->
      <div class="border-t border-(--color-border-primary) p-4">
        <div class="flex items-center gap-3 mb-3">
          <div
            class="w-10 h-10 bg-(--color-accent-hover) rounded-full flex items-center justify-center"
          >
            <span class="text-(--color-text-primary) font-medium">{{ userInitial() }}</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-(--color-text-primary) truncate">
              {{ userEmail() }}
            </p>
            <p class="text-xs text-(--color-text-muted)">
              {{ 'dashboard.administrator' | translate }}
            </p>
          </div>
        </div>
        <button (click)="signOut()" class="w-full nav-item">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          <span>{{ 'auth.logout' | translate }}</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Mobile Overlay -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 z-40 bg-(--color-overlay) lg:hidden" (click)="toggleSidebar()"></div>
  }

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Top Bar -->
    <header
      class="h-16 bg-(--color-bg-secondary) border-b border-(--color-border-primary) flex items-center justify-between px-4 lg:px-6"
    >
      <div class="flex items-center">
        <button
          (click)="toggleSidebar()"
          class="lg:hidden text-(--color-text-muted) hover:text-(--color-text-primary) mr-4"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
        <h2 class="text-lg font-semibold text-(--color-text-primary)">
          {{ currentPageTitle() }}
        </h2>
      </div>

      <!-- Language Selector -->
      <app-language-selector />
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-4 lg:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<div
  class="bg-[var(--color-bg-secondary)] rounded-lg p-4 flex items-center gap-4 group hover:bg-[var(--color-bg-tertiary)] transition-colors"
  [class.opacity-60]="item().is_archived"
>
  <!-- Drag Handle -->
  @if (showDragHandle()) {
    <div cdkDragHandle class="drag-handle">
      <mat-icon class="text-[20px]">drag_indicator</mat-icon>
    </div>
  }

  <!-- Thumbnail -->
  @if (imageUrl()) {
    <div
      class="w-14 h-14 rounded-lg overflow-hidden shrink-0 border border-[var(--color-border-primary)]"
    >
      <img [src]="imageUrl()" [alt]="role()" class="w-full h-full object-cover" />
    </div>
  }

  <!-- Pin Indicator -->
  @if (item().is_pinned) {
    <div class="text-[var(--color-pin)]">
      <mat-icon class="text-[20px]" style="font-variation-settings: 'FILL' 1" >star</mat-icon
      >
    </div>
  }

  <!-- Content -->
  <div class="flex-1 min-w-0">
    <h3 class="text-[var(--color-text-primary)] font-medium truncate">{{ role() }}</h3>
    <p class="text-[var(--color-text-muted)] text-sm truncate">{{ item().company }}</p>
    <p class="text-[var(--color-text-disabled)] text-xs mt-1">
      {{ item().start_date | date: 'MMM yyyy' }}
      @if (item().end_date) {
        - {{ item().end_date | date: 'MMM yyyy' }}
      } @else {
        - {{ 'preview.present' | translate }}
      }
    </p>
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
    <button (click)="pinToggled.emit()" class="icon-btn-pin">
      <mat-icon class="text-[20px]" [style.font-variation-settings]="item().is_pinned ? '\'FILL\' 1' : '\'FILL\' 0'" >star</mat-icon
      >
    </button>
    <a [routerLink]="[item().id]" class="icon-btn-edit">
      <mat-icon class="text-[20px]">edit</mat-icon>
    </a>
    <button (click)="archiveToggled.emit()" class="icon-btn-archive">
      @if (item().is_archived) {
        <mat-icon class="text-[20px]">unarchive</mat-icon>
      } @else {
        <mat-icon class="text-[20px]">inventory_2</mat-icon>
      }
    </button>
    <button (click)="deleteClicked.emit()" class="icon-btn-delete">
      <mat-icon class="text-[20px]">delete</mat-icon>
    </button>
  </div>
</div>

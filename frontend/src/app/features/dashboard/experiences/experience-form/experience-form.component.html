<div class="max-w-2xl mx-auto">
  <app-form-header
    [backRoute]="'/dashboard/experiences'"
    [title]="isNew ? ('experiences.create' | translate) : ('experiences.edit' | translate)"
  />

  @if (loading()) {
    <app-loading-spinner />
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <app-experience-form-base-info
        [company]="formData.company"
        [startDate]="formData.start_date"
        [endDate]="formData.end_date"
        (companyChange)="formData.company = $event"
        (startDateChange)="formData.start_date = $event"
        (endDateChange)="formData.end_date = $event"
      />

      <app-experience-form-translations
        [currentEditLanguage]="currentEditLanguage()"
        [currentTranslation]="currentTranslation"
        (languageChange)="setEditLanguage($event)"
        (translationChange)="updateTranslation($event.field, $event.value)"
      />

      <div class="card space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
          {{ 'experiences.images' | translate }}
        </h2>
        <app-image-upload
          folder="experiences"
          [multiple]="true"
          [sourceType]="'experience'"
          [sourceId]="currentId"
          [existingImages]="existingImages()"
          (uploaded)="onImageUploaded($event)"
        />
      </div>

      <div class="card">
        <app-skill-usage-manager #skillUsageManager sourceType="experience" [sourceId]="currentId" />
      </div>

      <app-form-actions
        [cancelRoute]="'/dashboard/experiences'"
        [saving]="saving()"
        [isNew]="isNew"
        [error]="error()"
      />
    </form>
  }
</div>

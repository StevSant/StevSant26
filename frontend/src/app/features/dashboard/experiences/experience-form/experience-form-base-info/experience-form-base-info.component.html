<div class="card space-y-6">
  <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
    {{ 'experiences.baseInfo' | translate }}
  </h2>

  <div>
    <label for="company" class="label">
      {{ 'experiences.fields.company' | translate }}
      <span class="text-[var(--color-error)]">*</span>
    </label>
    <input
      type="text"
      id="company"
      name="company"
      [ngModel]="company()"
      (ngModelChange)="companyChange.emit($event)"
      required
      class="input"
      [placeholder]="'experiences.companyPlaceholder' | translate"
    />
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label for="start_date" class="label">{{ 'experiences.fields.startDate' | translate }}</label>
      <input
        type="date"
        id="start_date"
        name="start_date"
        [ngModel]="startDate()"
        (ngModelChange)="startDateChange.emit($event)"
        class="input"
      />
    </div>
    <div>
      <label for="end_date" class="label">{{ 'experiences.fields.endDate' | translate }}</label>
      <input
        type="date"
        id="end_date"
        name="end_date"
        [ngModel]="endDate()"
        (ngModelChange)="endDateChange.emit($event)"
        class="input"
      />
      <p class="text-xs text-[var(--color-text-disabled)] mt-1">
        {{ 'experiences.currentJobHint' | translate }}
      </p>
    </div>
  </div>

  <div>
    <label for="company_image_url" class="label">{{
      'experiences.fields.companyImageUrl' | translate
    }}</label>
    <div class="flex items-center gap-3">
      @if (companyImageUrl()) {
        <img
          [src]="companyImageUrl()"
          alt="Company image"
          class="w-12 h-12 object-cover rounded-lg bg-[var(--color-bg-tertiary)] border border-[var(--color-border-primary)]"
        />
      }
      <input
        type="url"
        id="company_image_url"
        name="company_image_url"
        [ngModel]="companyImageUrl()"
        (ngModelChange)="companyImageUrlChange.emit($event)"
        class="input flex-1"
        [placeholder]="'experiences.companyImageUrlPlaceholder' | translate"
      />
    </div>
    <p class="text-xs text-[var(--color-text-disabled)] mt-1">
      {{ 'experiences.companyImageUrlHint' | translate }}
    </p>
  </div>
</div>

<div
  class="bg-[var(--color-bg-secondary)] rounded-lg p-4 flex items-center gap-4 group hover:bg-[var(--color-bg-tertiary)] transition-colors"
  [class.opacity-60]="item().is_archived"
>
  <!-- Drag Handle -->
  @if (showDragHandle()) {
    <div cdkDragHandle class="drag-handle">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
      </svg>
    </div>
  }

  <!-- Thumbnail -->
  @if (imageUrl()) {
    <div class="w-14 h-14 rounded-lg overflow-hidden shrink-0 border border-[var(--color-border-primary)]">
      <img [src]="imageUrl()" [alt]="name()" class="w-full h-full object-cover" />
    </div>
  }

  <!-- Pin Indicator -->
  @if (item().is_pinned) {
    <div class="text-[var(--color-pin)]">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
      </svg>
    </div>
  }

  <!-- Content -->
  <div class="flex-1 min-w-0">
    <h3 class="text-[var(--color-text-primary)] font-medium truncate">{{ name() }}</h3>
    @if (item().organizer) {
      <p class="text-[var(--color-text-muted)] text-sm truncate">{{ item().organizer }}</p>
    }
    @if (description()) {
      <p class="text-[var(--color-text-muted)] text-sm truncate mt-0.5">{{ description() }}</p>
    }
    <div class="flex items-center gap-2 mt-1">
      @if (item().date) {
        <span class="text-[var(--color-text-disabled)] text-xs">{{ item().date | date: 'mediumDate' }}</span>
      }
      @if (result()) {
        <span class="px-2 py-0.5 text-xs rounded-full bg-[var(--color-success-bg)] text-[var(--color-success)]">{{ result() }}</span>
      }
    </div>
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
    <button (click)="pinToggled.emit()" class="icon-btn-pin">
      <svg class="w-5 h-5" [attr.fill]="item().is_pinned ? 'currentColor' : 'none'" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
      </svg>
    </button>
    <a [routerLink]="[item().id]" class="icon-btn-edit">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      </svg>
    </a>
    <button (click)="archiveToggled.emit()" class="icon-btn-archive">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        @if (item().is_archived) {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        } @else {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
        }
      </svg>
    </button>
    <button (click)="deleteClicked.emit()" class="icon-btn-delete">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
    </button>
  </div>
</div>

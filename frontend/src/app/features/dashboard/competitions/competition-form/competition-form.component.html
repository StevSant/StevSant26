<div class="max-w-2xl mx-auto">
  <app-form-header
    [backRoute]="'/dashboard/competitions'"
    [title]="isNew ? ('competitions.create' | translate) : ('competitions.edit' | translate)"
  />

  @if (loading()) {
    <app-loading-spinner />
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <app-competition-form-base-info
        [organizer]="formData.organizer"
        [date]="formData.date"
        (organizerChange)="formData.organizer = $event"
        (dateChange)="formData.date = $event"
      />

      <app-competition-form-translations
        [currentEditLanguage]="currentEditLanguage()"
        [currentTranslation]="currentTranslation"
        (languageChange)="setEditLanguage($event)"
        (translationChange)="updateTranslation($event.field, $event.value)"
      />

      <div class="card space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
          {{ 'competitions.images' | translate }}
        </h2>
        <app-image-upload
          folder="competitions"
          [multiple]="true"
          [sourceType]="'competition'"
          [sourceId]="currentId"
          [existingImages]="existingImages()"
          (uploaded)="onImageUploaded($event)"
          (imagesReordered)="onImagesReordered($event)"
        />
      </div>

      <div class="card space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
          {{ 'competitions.documents' | translate }}
        </h2>
        <app-document-upload
          folder="competitions"
          [sourceType]="'competition'"
          [sourceId]="currentId"
          [existingDocuments]="existingDocuments()"
          (uploaded)="onDocumentUploaded($event)"
        />
      </div>

      <div class="card">
        <app-skill-usage-manager
          #skillUsageManager
          sourceType="competition"
          [sourceId]="currentId"
        />
      </div>

      <!-- Content Sections -->
      <div class="card">
        <app-content-section-manager
          #contentSectionManager
          sourceType="competition"
          [sourceId]="currentId"
        />
      </div>

      <app-form-actions
        [cancelRoute]="'/dashboard/competitions'"
        [saving]="saving()"
        [isNew]="isNew"
        [error]="error()"
      />
    </form>
  }
</div>

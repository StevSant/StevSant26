<div class="card space-y-6">
  <h2 class="text-lg font-semibold text-[var(--color-text-primary)] flex items-center gap-2">
    <span class="material-symbols-outlined text-[20px] text-[var(--color-accent)]">translate</span>
    {{ 'events.translatableContent' | translate }}
  </h2>

  <app-language-tabs
    [selectedLanguage]="currentEditLanguage()"
    (languageChange)="languageChange.emit($event)"
  />

  <div>
    <label for="name" class="label">
      {{ 'events.fields.name' | translate }} <span class="text-[var(--color-error)]">*</span>
      <span class="text-xs text-[var(--color-text-muted)] ml-2"
        >({{ currentEditLanguage() | uppercase }})</span
      >
    </label>
    <input
      type="text"
      id="name"
      name="name"
      [ngModel]="currentTranslation().name"
      (ngModelChange)="onFieldChange('name', $event)"
      class="input"
      [placeholder]="'events.namePlaceholder' | translate"
    />
  </div>

  <div>
    <label for="description" class="label">
      {{ 'events.fields.description' | translate }}
      <span class="text-xs text-[var(--color-text-muted)] ml-2"
        >({{ currentEditLanguage() | uppercase }})</span
      >
    </label>
    <textarea
      id="description"
      name="description"
      [ngModel]="currentTranslation().description"
      (ngModelChange)="onFieldChange('description', $event)"
      rows="4"
      class="input-textarea"
      [placeholder]="'events.descriptionPlaceholder' | translate"
    ></textarea>
  </div>
</div>

<div class="card space-y-6">
  <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
    {{ 'events.baseInfo' | translate }}
  </h2>
  <div>
    <label for="assisted_at" class="label">{{ 'events.fields.date' | translate }}</label>
    <input
      type="date"
      id="assisted_at"
      name="assisted_at"
      [ngModel]="assistedAt()"
      (ngModelChange)="assistedAtChange.emit($event)"
      class="input"
    />
  </div>
</div>

<div class="max-w-2xl mx-auto">
  <app-form-header
    [backRoute]="'/dashboard/events'"
    [title]="isNew ? ('events.create' | translate) : ('events.edit' | translate)"
  />

  @if (loading()) {
    <app-loading-spinner />
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <app-event-form-base-info
        [assistedAt]="formData.assisted_at"
        (assistedAtChange)="formData.assisted_at = $event"
      />

      <app-event-form-translations
        [currentEditLanguage]="currentEditLanguage()"
        [currentTranslation]="currentTranslation"
        (languageChange)="setEditLanguage($event)"
        (translationChange)="updateTranslation($event.field, $event.value)"
      />

      <div class="card space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
          {{ 'events.images' | translate }}
        </h2>
        <app-image-upload
          folder="events"
          [multiple]="true"
          [sourceType]="'event'"
          [sourceId]="currentId"
          [existingImages]="existingImages()"
          (uploaded)="onImageUploaded($event)"
        />
      </div>

      <div class="card space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
          {{ 'events.documents' | translate }}
        </h2>
        <app-document-upload
          folder="events"
          [sourceType]="'event'"
          [sourceId]="currentId"
          [existingDocuments]="existingDocuments()"
          (uploaded)="onDocumentUploaded($event)"
        />
      </div>

      <div class="card">
        <app-skill-usage-manager #skillUsageManager sourceType="event" [sourceId]="currentId" />
      </div>

      <!-- Content Sections -->
      <div class="card">
        <app-content-section-manager
          #contentSectionManager
          sourceType="event"
          [sourceId]="currentId"
        />
      </div>

      <app-form-actions
        [cancelRoute]="'/dashboard/events'"
        [saving]="saving()"
        [isNew]="isNew"
        [error]="error()"
      />
    </form>
  }
</div>

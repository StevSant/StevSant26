<div class="card space-y-6">
  <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
    {{ 'projects.association' | translate }}
  </h2>
  <p class="text-[var(--color-text-muted)] text-sm">
    {{ 'projects.associationHint' | translate }}
  </p>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <!-- Source Type -->
    <div>
      <label for="source_type" class="label">{{ 'projects.fields.sourceType' | translate }}</label>
      <select
        id="source_type"
        name="source_type"
        [ngModel]="sourceType()"
        (ngModelChange)="onSourceTypeChange($event)"
        class="input"
      >
        <option [ngValue]="null">{{ 'common.noAssociation' | translate }}</option>
        <option value="experience">
          {{ 'projects.sourceTypes.experience' | translate }}
        </option>
        <option value="competition">
          {{ 'projects.sourceTypes.competition' | translate }}
        </option>
        <option value="event">{{ 'projects.sourceTypes.event' | translate }}</option>
      </select>
    </div>

    <!-- Source ID (Dynamic Dropdown) -->
    <div>
      <label for="source_id" class="label">{{ 'projects.fields.sourceId' | translate }}</label>
      @if (loadingOptions()) {
        <div class="input flex items-center gap-2 text-[var(--color-text-muted)]">
          <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span class="text-sm">Cargando...</span>
        </div>
      } @else if (sourceType() && sourceOptions().length > 0) {
        <select
          id="source_id"
          name="source_id"
          [ngModel]="sourceId()"
          (ngModelChange)="sourceIdChange.emit($event)"
          class="input"
        >
          <option [ngValue]="null">{{ 'common.none' | translate }}</option>
          @for (option of sourceOptions(); track option.id) {
            <option [ngValue]="option.id">{{ option.label }}</option>
          }
        </select>
      } @else {
        <select
          id="source_id"
          name="source_id"
          [disabled]="!sourceType()"
          class="input"
        >
          <option [ngValue]="null">{{ !sourceType() ? ('common.noAssociation' | translate) : ('common.none' | translate) }}</option>
        </select>
      }
    </div>
  </div>

  <!-- Parent Project -->
  <div>
    <label for="parent_project_id" class="label">{{ 'projects.parentProject' | translate }}</label>
    <select
      id="parent_project_id"
      name="parent_project_id"
      [ngModel]="parentProjectId()"
      (ngModelChange)="parentProjectIdChange.emit($event)"
      class="input"
    >
      <option [ngValue]="null">{{ 'common.none' | translate }}</option>
      @for (project of parentProjects(); track project.id) {
        <option [ngValue]="project.id">{{ getProjectTitle()(project) }}</option>
      }
    </select>
  </div>
</div>

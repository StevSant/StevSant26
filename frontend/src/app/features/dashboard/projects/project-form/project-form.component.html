<div class="max-w-2xl mx-auto">
  <app-form-header
    [backRoute]="'/dashboard/projects'"
    [title]="isNew ? ('projects.create' | translate) : ('projects.edit' | translate)"
  />

  @if (loading()) {
    <app-loading-spinner />
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <app-project-form-base-info
        [url]="formData.url"
        [demoUrl]="formData.demo_url"
        [createdAt]="formData.created_at"
        (urlChange)="formData.url = $event"
        (demoUrlChange)="formData.demo_url = $event"
        (createdAtChange)="formData.created_at = $event"
      />

      <app-project-form-translations
        [currentEditLanguage]="currentEditLanguage()"
        [currentTranslation]="currentTranslation"
        (languageChange)="setEditLanguage($event)"
        (translationChange)="updateTranslation($event.field, $event.value)"
      />

      <app-project-form-association
        [sourceType]="formData.source_type"
        [sourceId]="formData.source_id"
        [parentProjectId]="formData.parent_project_id"
        [parentProjects]="parentProjects()"
        [getProjectTitle]="getProjectTitle.bind(this)"
        (sourceTypeChange)="formData.source_type = $event"
        (sourceIdChange)="formData.source_id = $event"
        (parentProjectIdChange)="formData.parent_project_id = $event"
      />

      <!-- Images -->
      <div class="card space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">
          {{ 'projects.projectImages' | translate }}
        </h2>
        <app-image-upload
          folder="projects"
          [multiple]="true"
          [sourceType]="'project'"
          [sourceId]="currentId"
          [existingImages]="existingImages()"
          (uploaded)="onImageUploaded($event)"
        />
      </div>

      <!-- Skill Usages -->
      <div class="card">
        <app-skill-usage-manager #skillUsageManager sourceType="project" [sourceId]="currentId" />
      </div>

      <!-- Content Sections -->
      <div class="card">
        <app-content-section-manager
          #contentSectionManager
          sourceType="project"
          [sourceId]="currentId"
        />
      </div>

      <app-form-actions
        [cancelRoute]="'/dashboard/projects'"
        [saving]="saving()"
        [isNew]="isNew"
        [error]="error()"
      />
    </form>
  }
</div>

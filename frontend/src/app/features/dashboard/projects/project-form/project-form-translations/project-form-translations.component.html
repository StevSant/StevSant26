<div class="card space-y-6">
  <h2 class="text-lg font-semibold text-[var(--color-text-primary)] flex items-center gap-2">
    <mat-icon class="text-[20px] text-[var(--color-accent)]">translate</mat-icon>
    {{ 'projects.translatableContent' | translate }}
  </h2>

  <!-- Language Tabs -->
  <app-language-tabs
    [selectedLanguage]="currentEditLanguage()"
    (languageChange)="onLanguageChange($event)"
  />

  <!-- Title -->
  <div>
    <label for="title" class="label">
      {{ 'projects.fields.title' | translate }}
      <span class="text-[var(--color-error)]">*</span>
      <span class="text-xs text-[var(--color-text-muted)] ml-2"
        >({{ currentEditLanguage() | uppercase }})</span
      >
    </label>
    <input
      type="text"
      id="title"
      name="title"
      [ngModel]="currentTranslation().title"
      (ngModelChange)="onFieldChange('title', $event)"
      class="input"
      [placeholder]="'projects.titlePlaceholder' | translate"
    />
  </div>

  <!-- Description -->
  <div>
    <label for="description" class="label">
      {{ 'projects.fields.description' | translate }}
      <span class="text-xs text-[var(--color-text-muted)] ml-2"
        >({{ currentEditLanguage() | uppercase }})</span
      >
    </label>
    <textarea
      id="description"
      name="description"
      [ngModel]="currentTranslation().description"
      (ngModelChange)="onFieldChange('description', $event)"
      rows="4"
      class="input-textarea"
      [placeholder]="'projects.descriptionPlaceholder' | translate"
    ></textarea>
  </div>
</div>

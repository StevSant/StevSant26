<div class="card space-y-6">
  <h2 class="text-lg font-semibold text-[var(--color-text-primary)] flex items-center gap-2">
    <span class="material-symbols-outlined text-[20px] text-[var(--color-accent)]">translate</span>
    {{ 'educations.translatableContent' | translate }}
  </h2>

  <app-language-tabs
    [selectedLanguage]="currentEditLanguage()"
    (languageChange)="languageChange.emit($event)"
  />

  <div>
    <label for="degree" class="label">
      {{ 'educations.fields.degree' | translate }}
      <span class="text-[var(--color-error)]">*</span>
      <span class="text-xs text-[var(--color-text-muted)] ml-2"
        >({{ currentEditLanguage() | uppercase }})</span
      >
    </label>
    <input
      type="text"
      id="degree"
      name="degree"
      [ngModel]="currentTranslation().degree"
      (ngModelChange)="onFieldChange('degree', $event)"
      class="input"
      [placeholder]="'educations.degreePlaceholder' | translate"
    />
  </div>

  <div>
    <label for="field_of_study" class="label">
      {{ 'educations.fields.fieldOfStudy' | translate }}
      <span class="text-xs text-[var(--color-text-muted)] ml-2"
        >({{ currentEditLanguage() | uppercase }})</span
      >
    </label>
    <input
      type="text"
      id="field_of_study"
      name="field_of_study"
      [ngModel]="currentTranslation().field_of_study"
      (ngModelChange)="onFieldChange('field_of_study', $event)"
      class="input"
      [placeholder]="'educations.fieldOfStudyPlaceholder' | translate"
    />
  </div>

  <div>
    <label for="description" class="label">
      {{ 'educations.fields.description' | translate }}
      <span class="text-xs text-[var(--color-text-muted)] ml-2"
        >({{ currentEditLanguage() | uppercase }})</span
      >
    </label>
    <textarea
      id="description"
      name="description"
      [ngModel]="currentTranslation().description"
      (ngModelChange)="onFieldChange('description', $event)"
      rows="4"
      class="input-textarea"
      [placeholder]="'educations.descriptionPlaceholder' | translate"
    ></textarea>
  </div>
</div>

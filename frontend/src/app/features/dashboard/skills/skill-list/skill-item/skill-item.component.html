<div
  class="bg-[var(--color-bg-secondary)] rounded-lg p-4 flex items-center gap-4 group hover:bg-[var(--color-bg-tertiary)] transition-colors"
  [class.opacity-60]="item().is_archived"
>
  <!-- Drag Handle -->
  @if (showDragHandle()) {
    <div cdkDragHandle class="drag-handle">
      <span class="material-symbols-outlined text-[20px]">drag_indicator</span>
    </div>
  }

  <!-- Pin Indicator -->
  @if (item().is_pinned) {
    <div class="text-[var(--color-pin)]">
      <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1"
        >star</span
      >
    </div>
  }

  <!-- Content -->
  <div class="flex-1 min-w-0">
    <h3 class="text-[var(--color-text-primary)] font-medium truncate">{{ name() }}</h3>
    @if (description()) {
      <p class="text-[var(--color-text-muted)] text-sm truncate mt-1">{{ description() }}</p>
    }
    @if (categoryName()) {
      <span
        class="inline-block mt-1 px-2 py-0.5 text-xs rounded-full bg-[var(--color-accent)]/20 text-[var(--color-accent)]"
        >{{ categoryName() }}</span
      >
    }
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
    <button (click)="pinToggled.emit()" class="icon-btn-pin">
      <span
        class="material-symbols-outlined text-[20px]"
        [style.font-variation-settings]="item().is_pinned ? '\'FILL\' 1' : '\'FILL\' 0'"
        >star</span
      >
    </button>
    <a [routerLink]="[item().id]" class="icon-btn-edit">
      <span class="material-symbols-outlined text-[20px]">edit</span>
    </a>
    <button (click)="archiveToggled.emit()" class="icon-btn-archive">
      @if (item().is_archived) {
        <span class="material-symbols-outlined text-[20px]">unarchive</span>
      } @else {
        <span class="material-symbols-outlined text-[20px]">inventory_2</span>
      }
    </button>
    <button (click)="deleteClicked.emit()" class="icon-btn-delete">
      <span class="material-symbols-outlined text-[20px]">delete</span>
    </button>
  </div>
</div>

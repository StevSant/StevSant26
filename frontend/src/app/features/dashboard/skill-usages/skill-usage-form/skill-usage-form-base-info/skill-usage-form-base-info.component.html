<div class="card p-6 space-y-6">
  <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">Información Base</h2>

  <div>
    <label for="skill_id" class="label">
      Habilidad <span class="text-[var(--color-error)]">*</span>
    </label>
    <select
      id="skill_id"
      name="skill_id"
      [ngModel]="skillId()"
      (ngModelChange)="skillIdChange.emit($event)"
      required
      class="input"
    >
      <option [ngValue]="0" disabled>Selecciona una habilidad</option>
      @for (skill of skills(); track skill.id) {
        <option [ngValue]="skill.id">{{ getSkillName()(skill) }}</option>
      }
    </select>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label for="source_type" class="label">
        Tipo de Fuente <span class="text-[var(--color-error)]">*</span>
      </label>
      <select
        id="source_type"
        name="source_type"
        [ngModel]="sourceType()"
        (ngModelChange)="onSourceTypeChange($event)"
        required
        class="input"
      >
        <option value="project">Proyecto</option>
        <option value="experience">Experiencia</option>
        <option value="competition">Competencia</option>
        <option value="event">Evento</option>
      </select>
    </div>
    <div>
      <label for="source_id" class="label">
        Fuente <span class="text-[var(--color-error)]">*</span>
      </label>
      @if (loadingOptions()) {
        <div class="input flex items-center gap-2 text-[var(--color-text-muted)]">
          <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span class="text-sm">Cargando...</span>
        </div>
      } @else if (sourceOptions().length > 0) {
        <select
          id="source_id"
          name="source_id"
          [ngModel]="sourceId()"
          (ngModelChange)="sourceIdChange.emit($event)"
          required
          class="input"
        >
          <option [ngValue]="0" disabled>Selecciona una fuente</option>
          @for (option of sourceOptions(); track option.id) {
            <option [ngValue]="option.id">{{ option.label }}</option>
          }
        </select>
      } @else {
        <select
          id="source_id"
          name="source_id"
          class="input"
          disabled
        >
          <option>Sin opciones disponibles</option>
        </select>
      }
    </div>
  </div>

  <div>
    <label for="level" class="label">Nivel de Dominio (1-5)</label>
    <div class="flex items-center gap-2">
      @for (i of [1, 2, 3, 4, 5]; track i) {
        <button
          type="button"
          (click)="setLevel(i)"
          class="p-1 transition-colors"
          [class.text-[var(--color-pin)]]="level() !== null && i <= level()!"
          [class.text-[var(--color-text-disabled)]]="level() === null || i > level()!"
        >
          <span
            class="material-symbols-outlined text-[32px]"
            style="font-variation-settings: 'FILL' 1"
          >star</span>
        </button>
      }
      @if (level()) {
        <button
          type="button"
          (click)="setLevel(null)"
          class="ml-2 text-[var(--color-text-muted)] hover:text-[var(--color-text-primary)] text-sm"
        >
          Limpiar
        </button>
      }
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label for="started_at" class="label">Fecha de Inicio</label>
      <input
        type="date"
        id="started_at"
        name="started_at"
        [ngModel]="startedAt()"
        (ngModelChange)="startedAtChange.emit($event)"
        class="input"
      />
    </div>
    <div>
      <label for="ended_at" class="label">Fecha de Fin</label>
      <input
        type="date"
        id="ended_at"
        name="ended_at"
        [ngModel]="endedAt()"
        (ngModelChange)="endedAtChange.emit($event)"
        class="input"
      />
    </div>
  </div>
</div>

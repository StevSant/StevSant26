<div class="max-w-2xl mx-auto">
  <app-form-header
    [backRoute]="'/dashboard/skill-usages'"
    [title]="isNew ? 'Nuevo Uso de Habilidad' : 'Editar Uso de Habilidad'"
  />

  @if (loading()) {
    <app-loading-spinner />
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <app-skill-usage-form-base-info
        [skills]="skills()"
        [skillId]="formData.skill_id"
        [sourceType]="formData.source_type"
        [sourceId]="formData.source_id"
        [level]="formData.level"
        [startedAt]="formData.started_at"
        [endedAt]="formData.ended_at"
        [getSkillName]="getSkillName.bind(this)"
        (skillIdChange)="formData.skill_id = $event"
        (sourceTypeChange)="formData.source_type = $event"
        (sourceIdChange)="formData.source_id = $event"
        (levelChange)="formData.level = $event"
        (startedAtChange)="formData.started_at = $event"
        (endedAtChange)="formData.ended_at = $event"
      />

      <app-skill-usage-form-translations
        [currentEditLanguage]="currentEditLanguage()"
        [currentTranslation]="currentTranslation"
        (languageChange)="setEditLanguage($event)"
        (notesChange)="updateTranslation('notes', $event)"
      />

      @if (error()) {
        <div class="alert-error">
          <p class="text-sm">{{ error() }}</p>
        </div>
      }

      <div class="flex justify-end gap-3">
        <a routerLink="/dashboard/skill-usages" class="btn-secondary">Cancelar</a>
        <button type="submit" [disabled]="saving()" class="btn-primary flex items-center gap-2">
          @if (saving()) {
            <svg
              class="animate-spin h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>Guardando...</span>
          } @else {
            <span>{{ isNew ? 'Crear Vínculo' : 'Guardar Cambios' }}</span>
          }
        </button>
      </div>
    </form>
  }
</div>

<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-4 mb-6">
    <a routerLink="/dashboard/skill-usages" class="icon-btn">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <h1 class="text-2xl font-bold text-[var(--color-text-primary)]">
      {{ isNew ? 'Nuevo Uso de Habilidad' : 'Editar Uso de Habilidad' }}
    </h1>
  </div>

  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <svg
        class="animate-spin h-8 w-8 text-[var(--color-accent)]"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    </div>
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Base Info Card -->
      <div class="card p-6 space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">Información Base</h2>

        <div>
          <label for="skill_id" class="label">
            Habilidad <span class="text-[var(--color-error)]">*</span>
          </label>
          <select
            id="skill_id"
            name="skill_id"
            [(ngModel)]="formData.skill_id"
            required
            class="input"
          >
            <option [ngValue]="0" disabled>Selecciona una habilidad</option>
            @for (skill of skills(); track skill.id) {
              <option [ngValue]="skill.id">{{ getSkillName(skill) }}</option>
            }
          </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="source_type" class="label">
              Tipo de Fuente <span class="text-[var(--color-error)]">*</span>
            </label>
            <select
              id="source_type"
              name="source_type"
              [(ngModel)]="formData.source_type"
              required
              class="input"
            >
              <option value="project">Proyecto</option>
              <option value="experience">Experiencia</option>
              <option value="competition">Competencia</option>
              <option value="event">Evento</option>
            </select>
          </div>
          <div>
            <label for="source_id" class="label">
              ID de Fuente <span class="text-[var(--color-error)]">*</span>
            </label>
            <input
              type="number"
              id="source_id"
              name="source_id"
              [(ngModel)]="formData.source_id"
              required
              class="input"
              placeholder="ID"
            />
          </div>
        </div>

        <div>
          <label for="level" class="label">Nivel de Dominio (1-5)</label>
          <div class="flex items-center gap-2">
            @for (i of [1, 2, 3, 4, 5]; track i) {
              <button
                type="button"
                (click)="setLevel(i)"
                class="p-1 transition-colors"
                [class.text-[var(--color-pin)]]="formData.level !== null && i <= formData.level"
                [class.text-[var(--color-text-disabled)]]="
                  formData.level === null || i > formData.level
                "
              >
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                  />
                </svg>
              </button>
            }
            @if (formData.level) {
              <button
                type="button"
                (click)="setLevel(null)"
                class="ml-2 text-[var(--color-text-muted)] hover:text-[var(--color-text-primary)] text-sm"
              >
                Limpiar
              </button>
            }
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="started_at" class="label">Fecha de Inicio</label>
            <input
              type="date"
              id="started_at"
              name="started_at"
              [(ngModel)]="formData.started_at"
              class="input"
            />
          </div>
          <div>
            <label for="ended_at" class="label">Fecha de Fin</label>
            <input
              type="date"
              id="ended_at"
              name="ended_at"
              [(ngModel)]="formData.ended_at"
              class="input"
            />
          </div>
        </div>
      </div>

      <!-- Translations Card -->
      <div class="card p-6 space-y-6">
        <h2 class="text-lg font-semibold text-[var(--color-text-primary)] flex items-center gap-2">
          <svg
            class="w-5 h-5 text-[var(--color-accent)]"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"
            />
          </svg>
          Contenido Traducible
        </h2>

        <!-- Language Tabs -->
        <app-language-tabs
          [selectedLanguage]="currentEditLanguage()"
          (languageChange)="setEditLanguage($event)"
        />

        <div>
          <label for="notes" class="label">
            Notas
            <span class="text-xs text-[var(--color-text-muted)] ml-2"
              >({{ currentEditLanguage() | uppercase }})</span
            >
          </label>
          <textarea
            id="notes"
            name="notes"
            [ngModel]="currentTranslation.notes"
            (ngModelChange)="updateTranslation('notes', $event)"
            rows="3"
            class="input resize-none"
            placeholder="Describe cómo usaste esta habilidad..."
          ></textarea>
        </div>
      </div>

      @if (error()) {
        <div class="alert-error">
          <p class="text-sm">{{ error() }}</p>
        </div>
      }

      <div class="flex justify-end gap-3">
        <a routerLink="/dashboard/skill-usages" class="btn-secondary">Cancelar</a>
        <button type="submit" [disabled]="saving()" class="btn-primary flex items-center gap-2">
          @if (saving()) {
            <svg
              class="animate-spin h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>Guardando...</span>
          } @else {
            <span>{{ isNew ? 'Crear Vínculo' : 'Guardar Cambios' }}</span>
          }
        </button>
      </div>
    </form>
  }
</div>

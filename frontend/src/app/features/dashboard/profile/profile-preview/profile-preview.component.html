<div class="max-w-4xl mx-auto">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-[var(--color-text-primary)]">
      {{ 'preview.title' | translate }}
    </h1>
    <p class="text-[var(--color-text-muted)] mt-1">{{ 'preview.subtitle' | translate }}</p>
  </div>

  @if (loading()) {
    <app-loading-spinner />
  } @else {
    <div class="space-y-8">
      <app-preview-profile-card
        [profile]="profile()"
        [avatarUrl]="avatarUrl()"
        [bannerUrl]="bannerUrl()"
        [headline]="getProfileHeadline()"
        [bio]="getProfileBio()"
      />

      <app-preview-projects-section
        [projects]="projects()"
        [getEntityTranslation]="getEntityTranslation.bind(this)"
      />

      <app-preview-experiences-section
        [experiences]="experiences()"
        [getEntityTranslation]="getEntityTranslation.bind(this)"
        [formatDateRange]="formatDateRange.bind(this)"
      />

      <app-preview-competitions-section
        [competitions]="competitions()"
        [getEntityTranslation]="getEntityTranslation.bind(this)"
      />

      <app-preview-events-section
        [events]="events()"
        [getEntityTranslation]="getEntityTranslation.bind(this)"
      />

      <app-preview-skills-section
        [skillCategories]="skillCategories()"
        [getEntityTranslation]="getEntityTranslation.bind(this)"
        [getCategoryName]="getCategoryName.bind(this)"
        [getStarArray]="getStarArray.bind(this)"
      />
    </div>
  }
</div>

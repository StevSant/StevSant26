<div class="card space-y-6">
  <h2 class="text-xl font-semibold text-[var(--color-text-primary)] flex items-center gap-2">
    <svg
      class="w-6 h-6 text-[var(--color-accent)]"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
      />
    </svg>
    {{ 'profile.personalInfo' | translate }}
  </h2>

  <!-- Avatar Upload -->
  <div>
    <label class="label">{{ 'profile.avatar' | translate }}</label>
    <app-image-upload
      folder="profile"
      [altText]="'Foto de perfil'"
      [isAvatar]="true"
      [existingImageUrl]="existingAvatarUrl()"
      (uploaded)="onAvatarUploaded($event)"
    />
  </div>

  <!-- Banner Upload -->
  <div>
    <label class="label">{{ 'profile.banner' | translate }}</label>
    <app-image-upload
      folder="profile"
      [altText]="'Banner de perfil'"
      [isBanner]="true"
      [existingImageUrl]="existingBannerUrl()"
      (uploaded)="onBannerUploaded($event)"
    />
  </div>

  <!-- Name Fields -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label for="first_name" class="label">{{ 'profile.firstName' | translate }}</label>
      <input
        type="text"
        id="first_name"
        name="first_name"
        [ngModel]="formData().first_name"
        (ngModelChange)="formData().first_name = $event; onFieldChange()"
        class="input"
        [placeholder]="'profile.firstNamePlaceholder' | translate"
      />
    </div>
    <div>
      <label for="last_name" class="label">{{ 'profile.lastName' | translate }}</label>
      <input
        type="text"
        id="last_name"
        name="last_name"
        [ngModel]="formData().last_name"
        (ngModelChange)="formData().last_name = $event; onFieldChange()"
        class="input"
        [placeholder]="'profile.lastNamePlaceholder' | translate"
      />
    </div>
  </div>

  <!-- Nickname -->
  <div>
    <label for="nickname" class="label">{{ 'profile.nickname' | translate }}</label>
    <input
      type="text"
      id="nickname"
      name="nickname"
      [ngModel]="formData().nickname"
      (ngModelChange)="formData().nickname = $event; onFieldChange()"
      class="input"
      [placeholder]="'profile.nicknamePlaceholder' | translate"
    />
  </div>
</div>

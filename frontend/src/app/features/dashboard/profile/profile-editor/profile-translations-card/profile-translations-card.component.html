<div class="card space-y-6">
  <h2 class="text-xl font-semibold text-[var(--color-text-primary)] flex items-center gap-2">
    <mat-icon class="text-[24px] text-[var(--color-accent)]">translate</mat-icon>
    {{ 'profile.translations' | translate }}
  </h2>

  <!-- Language Tabs -->
  <div class="flex gap-2 border-b border-[var(--color-border-secondary)]">
    @for (lang of supportedLanguages(); track lang.code) {
      <button
        type="button"
        (click)="setEditLanguage(lang.code)"
        class="px-4 py-2 text-sm font-medium transition-colors"
        [class.text-[var(--color-accent)]]="currentEditLanguage() === lang.code"
        [class.border-b-2]="currentEditLanguage() === lang.code"
        [class.border-[var(--color-accent)]]="currentEditLanguage() === lang.code"
        [class.text-[var(--color-text-muted)]]="currentEditLanguage() !== lang.code"
      >
        {{ lang.name }}
      </button>
    }
  </div>

  <!-- About (Translatable) -->
  <div>
    <label for="about" class="label">
      {{ 'profile.about' | translate }}
      <span class="text-xs text-[var(--color-text-muted)] ml-2"
        >({{ currentEditLanguage() | uppercase }})</span
      >
    </label>
    <textarea
      id="about"
      name="about"
      [ngModel]="currentTranslation().about"
      (ngModelChange)="onTranslationChange('about', $event)"
      rows="5"
      class="input-textarea"
      [placeholder]="'profile.aboutPlaceholder' | translate"
    ></textarea>
  </div>
</div>

<div class="card space-y-6">
  <h2 class="text-xl font-semibold text-[var(--color-text-primary)] flex items-center gap-2">
    <span class="material-symbols-outlined text-[24px] text-[var(--color-accent)]">link</span>
    {{ 'profile.socialLinks' | translate }}
  </h2>

  <!-- Email & Phone -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label for="email" class="label">{{ 'profile.email' | translate }}</label>
      <input
        type="email"
        id="email"
        name="email"
        [ngModel]="formData().email"
        (ngModelChange)="formData().email = $event; onFieldChange()"
        class="input"
        [placeholder]="'profile.emailPlaceholder' | translate"
      />
    </div>
    <div>
      <label for="phone" class="label">{{ 'profile.phone' | translate }}</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        [ngModel]="formData().phone"
        (ngModelChange)="formData().phone = $event; onFieldChange()"
        class="input"
        [placeholder]="'profile.phonePlaceholder' | translate"
      />
    </div>
  </div>

  <!-- WhatsApp -->
  <div>
    <label for="whatsapp" class="label">{{ 'profile.whatsapp' | translate }}</label>
    <input
      type="text"
      id="whatsapp"
      name="whatsapp"
      [ngModel]="formData().whatsapp"
      (ngModelChange)="formData().whatsapp = $event; onFieldChange()"
      class="input"
      [placeholder]="'profile.whatsappPlaceholder' | translate"
    />
  </div>

  <!-- LinkedIn & GitHub -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label for="linkedin_url" class="label">{{ 'profile.linkedin' | translate }}</label>
      <input
        type="url"
        id="linkedin_url"
        name="linkedin_url"
        [ngModel]="formData().linkedin_url"
        (ngModelChange)="formData().linkedin_url = $event; onFieldChange()"
        class="input"
        [placeholder]="'profile.linkedinPlaceholder' | translate"
      />
    </div>
    <div>
      <label for="github_url" class="label">{{ 'profile.github' | translate }}</label>
      <input
        type="url"
        id="github_url"
        name="github_url"
        [ngModel]="formData().github_url"
        (ngModelChange)="formData().github_url = $event; onFieldChange()"
        class="input"
        [placeholder]="'profile.githubPlaceholder' | translate"
      />
    </div>
  </div>

  <!-- Instagram -->
  <div>
    <label for="instagram_url" class="label">{{ 'profile.instagram' | translate }}</label>
    <input
      type="url"
      id="instagram_url"
      name="instagram_url"
      [ngModel]="formData().instagram_url"
      (ngModelChange)="formData().instagram_url = $event; onFieldChange()"
      class="input"
      [placeholder]="'profile.instagramPlaceholder' | translate"
    />
  </div>
</div>

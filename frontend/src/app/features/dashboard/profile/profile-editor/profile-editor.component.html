<div class="max-w-2xl mx-auto">
  <!-- Loading State -->
  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <svg class="spinner-lg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    </div>
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Personal Info Card -->
      <app-personal-info-card
        [formData]="personalInfoData"
        [existingAvatarUrl]="existingAvatarUrl()"
        [existingBannerUrl]="existingBannerUrl()"
        (avatarUploaded)="onAvatarUploaded($event)"
        (bannerUploaded)="onBannerUploaded($event)"
        (formDataChange)="onPersonalInfoChange($event)"
      />

      <!-- Social Links Card -->
      <app-social-links-card
        [formData]="socialLinksData"
        (formDataChange)="onSocialLinksChange($event)"
      />

      <!-- CV Documents -->
      <app-cv-manager />

      <!-- Translations Card -->
      <app-profile-translations-card
        [supportedLanguages]="supportedLanguages"
        [currentEditLanguage]="currentEditLanguage()"
        [currentTranslation]="currentTranslation"
        (editLanguageChange)="setEditLanguage($event)"
        (translationChange)="updateTranslation($event.field, $event.value)"
      />

      <!-- Messages -->
      @if (error()) {
        <div class="alert-error">
          <p>{{ error() }}</p>
        </div>
      }

      @if (success()) {
        <div class="alert-success">
          <p>{{ success() }}</p>
        </div>
      }

      <!-- Actions -->
      <div class="flex justify-end gap-3">
        <button type="button" (click)="resetForm()" class="btn-secondary px-6">
          {{ 'common.cancel' | translate }}
        </button>
        <button type="submit" [disabled]="saving()" class="btn-primary px-6">
          @if (saving()) {
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>{{ 'common.saving' | translate }}</span>
          } @else {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
            <span>{{ 'common.saveChanges' | translate }}</span>
          }
        </button>
      </div>
    </form>
  }
</div>

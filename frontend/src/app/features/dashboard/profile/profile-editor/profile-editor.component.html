<div class="max-w-2xl mx-auto">
  <!-- Loading State -->
  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <svg class="spinner-lg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    </div>
  } @else {
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Profile Card -->
      <div class="card space-y-6">
        <h2 class="text-xl font-semibold text-[var(--color-text-primary)] flex items-center gap-2">
          <svg
            class="w-6 h-6 text-[var(--color-accent)]"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
          {{ 'profile.personalInfo' | translate }}
        </h2>

        <!-- Avatar Upload -->
        <div>
          <label class="label">{{ 'profile.avatar' | translate }}</label>
          <app-image-upload
            folder="profile"
            [altText]="'Foto de perfil'"
            [isAvatar]="true"
            [existingImageUrl]="existingAvatarUrl()"
            (uploaded)="onAvatarUploaded($event)"
          />
        </div>

        <!-- Banner Upload -->
        <div>
          <label class="label">{{ 'profile.banner' | translate }}</label>
          <app-image-upload
            folder="profile"
            [altText]="'Banner de perfil'"
            [isBanner]="true"
            [existingImageUrl]="existingBannerUrl()"
            (uploaded)="onBannerUploaded($event)"
          />
        </div>

        <!-- Name Fields -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="first_name" class="label">{{ 'profile.firstName' | translate }}</label>
            <input
              type="text"
              id="first_name"
              name="first_name"
              [(ngModel)]="formData.first_name"
              class="input"
              [placeholder]="'profile.firstNamePlaceholder' | translate"
            />
          </div>
          <div>
            <label for="last_name" class="label">{{ 'profile.lastName' | translate }}</label>
            <input
              type="text"
              id="last_name"
              name="last_name"
              [(ngModel)]="formData.last_name"
              class="input"
              [placeholder]="'profile.lastNamePlaceholder' | translate"
            />
          </div>
        </div>

        <!-- Nickname -->
        <div>
          <label for="nickname" class="label">{{ 'profile.nickname' | translate }}</label>
          <input
            type="text"
            id="nickname"
            name="nickname"
            [(ngModel)]="formData.nickname"
            class="input"
            [placeholder]="'profile.nicknamePlaceholder' | translate"
          />
        </div>
      </div>

      <!-- Translations Card -->
      <div class="card space-y-6">
        <h2 class="text-xl font-semibold text-[var(--color-text-primary)] flex items-center gap-2">
          <svg
            class="w-6 h-6 text-[var(--color-accent)]"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"
            />
          </svg>
          {{ 'profile.translations' | translate }}
        </h2>

        <!-- Language Tabs -->
        <div class="flex gap-2 border-b border-[var(--color-border-secondary)]">
          @for (lang of supportedLanguages; track lang.code) {
            <button
              type="button"
              (click)="setEditLanguage(lang.code)"
              class="px-4 py-2 text-sm font-medium transition-colors"
              [class.text-[var(--color-accent)]]="currentEditLanguage() === lang.code"
              [class.border-b-2]="currentEditLanguage() === lang.code"
              [class.border-[var(--color-accent)]]="currentEditLanguage() === lang.code"
              [class.text-[var(--color-text-muted)]]="currentEditLanguage() !== lang.code"
            >
              {{ lang.name }}
            </button>
          }
        </div>

        <!-- About (Translatable) -->
        <div>
          <label for="about" class="label">
            {{ 'profile.about' | translate }}
            <span class="text-xs text-[var(--color-text-muted)] ml-2"
              >({{ currentEditLanguage() | uppercase }})</span
            >
          </label>
          <textarea
            id="about"
            name="about"
            [ngModel]="currentTranslation.about"
            (ngModelChange)="updateTranslation('about', $event)"
            rows="5"
            class="input-textarea"
            [placeholder]="'profile.aboutPlaceholder' | translate"
          ></textarea>
        </div>
      </div>

      <!-- Messages -->
      @if (error()) {
        <div class="alert-error">
          <p>{{ error() }}</p>
        </div>
      }

      @if (success()) {
        <div class="alert-success">
          <p>{{ success() }}</p>
        </div>
      }

      <!-- Actions -->
      <div class="flex justify-end gap-3">
        <button type="button" (click)="resetForm()" class="btn-secondary px-6">
          {{ 'common.cancel' | translate }}
        </button>
        <button type="submit" [disabled]="saving()" class="btn-primary px-6">
          @if (saving()) {
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>{{ 'common.saving' | translate }}</span>
          } @else {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
            <span>{{ 'common.saveChanges' | translate }}</span>
          }
        </button>
      </div>
    </form>
  }
</div>

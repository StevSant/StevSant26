<!-- About & Map Section -->
<section appScrollReveal class="py-12 sm:py-16 lg:py-24 px-4 sm:px-6 lg:px-8">
  <div class="max-w-6xl mx-auto">
    <h2
      class="text-sm uppercase tracking-[0.3em] text-(--color-text-muted) mb-3 text-center font-medium"
    >
      {{ 'portfolio.sections.about' | translate }}
    </h2>
    <div class="w-12 h-px bg-(--color-accent) mx-auto mb-8 sm:mb-10 lg:mb-14 opacity-60"></div>

    <div
      class="flex flex-col items-center gap-8 lg:gap-14"
      [class]="hasLocationData() ? 'lg:flex-row lg:items-start' : ''"
    >
      <!-- About text -->
      <div
        class="flex-1 w-full"
        [class]="hasLocationData() ? 'lg:max-w-none' : 'max-w-3xl mx-auto'"
      >
        @if (bio()) {
          <div
            class="text-(--color-text-secondary) text-base sm:text-lg leading-relaxed"
            [class]="hasLocationData() ? 'text-center lg:text-left' : 'text-center'"
            [innerHTML]="bio()! | safeHtml"
          ></div>
        } @else {
          <p class="text-(--color-text-muted) text-center italic font-light">
            {{ 'portfolio.empty.about' | translate }}
          </p>
        }
      </div>

      <!-- Map card -->
      @if (hasLocationData()) {
        <div class="w-full max-w-sm shrink-0">
          <app-portfolio-map-card
            [city]="city()"
            [countryCode]="countryCode()"
            [timezone]="timezone()"
            [jobTitle]="jobTitle()"
            [latitude]="latitude()"
            [longitude]="longitude()"
          />
        </div>
      }
    </div>
  </div>
</section>

@if (data.loading()) {
  <app-portfolio-home-skeleton />
} @else {
  <app-portfolio-hero
    [firstName]="data.profile()?.first_name || ''"
    [lastName]="data.profile()?.last_name || ''"
    [nickname]="data.profile()?.nickname || null"
    [isAvailable]="data.profile()?.is_available"
    [avatarUrl]="data.avatarUrl()"
    [bannerUrl]="data.bannerUrl()"
    [profileJobTitle]="profileJobTitle()"
    [yearsOfExperience]="yearsOfExperience()"
    [cvDocuments]="data.cvDocuments()"
    (imageModalOpen)="openImageModal($event)"
  />

  <app-portfolio-about
    [bio]="data.getProfileBio()"
    [hasLocationData]="hasLocationData()"
    [city]="data.profile()?.city || ''"
    [countryCode]="data.profile()?.country_code || ''"
    [timezone]="data.profile()?.timezone || ''"
    [jobTitle]="profileJobTitle()"
    [latitude]="data.profile()?.latitude || 0"
    [longitude]="data.profile()?.longitude || 0"
  />

  <app-portfolio-featured-projects [pinnedProjects]="pinnedProjects()" />

  <app-portfolio-skills-ticker
    [topSkillCategories]="topSkillCategories()"
    [allSkills]="allSkills()"
  />

  <!-- Image Modal -->
  @if (showImageModal()) {
    <div
      role="dialog"
      aria-modal="true"
      class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm"
      (click)="onModalBackdropClick($event)"
      (keydown.escape)="closeImageModal()"
    >
      <div class="relative max-w-[90vw] max-h-[90vh]">
        <!-- Close button -->
        <button
          type="button"
          (click)="closeImageModal()"
          class="absolute -top-12 right-0 p-2 text-white hover:text-(--color-accent) transition-colors"
          [attr.aria-label]="'portfolio.a11y.closeModal' | translate"
        >
          <mat-icon class="text-[32px] text-white hover:text-(--color-accent) transition-colors"
            >close</mat-icon
          >
        </button>
        <!-- Image -->
        <img
          [src]="modalImageUrl()"
          [alt]="modalImageAlt()"
          class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl"
        />
      </div>
    </div>
  }
}

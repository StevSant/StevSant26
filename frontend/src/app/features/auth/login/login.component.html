<div class="min-h-screen flex items-center justify-center bg-(--color-bg-primary) relative">
  <!-- Top Controls -->
  <div class="absolute top-4 right-4 flex items-center gap-2">
    <app-theme-toggle />
    <app-language-selector />
  </div>

  <div class="max-w-md w-full mx-4">
    <!-- Logo/Header — Elegant -->
    <div class="text-center mb-10">
      <h1 class="text-2xl font-semibold text-(--color-text-primary) tracking-tight">
        {{ 'dashboard.title' | translate }}
      </h1>
      <div class="w-10 h-px bg-(--color-accent) mx-auto mt-4 mb-3 opacity-50"></div>
      <p class="text-(--color-text-muted) text-sm tracking-wide">
        {{ 'auth.signInToContinue' | translate }}
      </p>
    </div>

    <!-- Login Card — Elegant -->
    <div class="card shadow-2xl p-8">
      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Email Field -->
        <div>
          <label for="email" class="label">{{ 'auth.email' | translate }}</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            required
            class="input"
            placeholder="tu&#64;email.com"
            [disabled]="loading()"
          />
        </div>

        <!-- Password Field -->
        <div>
          <label for="password" class="label">{{ 'auth.password' | translate }}</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            class="input"
            placeholder="••••••••"
            [disabled]="loading()"
          />
        </div>

        <!-- Error Message -->
        @if (error()) {
          <div class="alert-error">
            <p>{{ error() }}</p>
          </div>
        }

        <!-- Submit Button -->
        <button type="submit" [disabled]="loading()" class="w-full btn-primary py-3 tracking-wide">
          @if (loading()) {
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span>{{ 'common.loading' | translate }}</span>
          } @else {
            <span>{{ 'auth.login' | translate }}</span>
          }
        </button>
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-(--color-text-disabled) text-xs mt-8 uppercase tracking-widest">
      {{ 'auth.welcomeBack' | translate }}
    </p>
  </div>
</div>

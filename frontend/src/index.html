    <!-- Capture referrer source before Angular router strips query params or redirects /from/:source -->
    <script>
      (function () {
        try {
          // 1. Check /from/:source path (most reliable — LinkedIn can't strip paths)
          var match = window.location.pathname.match(/^\/from\/([^/]+)/);
          if (match) {
            var src = decodeURIComponent(match[1]);
            var map = {
              linkedin: 'linkedin.com',
              github: 'github.com',
              indeed: 'indeed.com',
              glassdoor: 'glassdoor.com',
              twitter: 'x.com',
              x: 'x.com',
              instagram: 'instagram.com',
              facebook: 'facebook.com',
              cv: 'cv',
              resume: 'resume',
              curriculum: 'curriculum',
            };
            var resolved = map[src.toLowerCase()] || src;
            document.cookie =
              'analytics_ref=' + encodeURIComponent(resolved) + ';path=/;max-age=300;SameSite=Lax';
            return;
          }
          // 2. Fallback: check ?ref= / ?utm_source= query params
          var p = new URLSearchParams(window.location.search);
          var r = p.get('ref') || p.get('utm_source');
          if (r) {
            document.cookie =
              'analytics_ref=' + encodeURIComponent(r) + ';path=/;max-age=300;SameSite=Lax';
            return;
          }
          // 3. Detect referrer from document.referrer (map redirect/tracker domains)
          if (document.referrer) {
            try {
              var refHost = new URL(document.referrer).hostname.replace('www.', '');
              var domainMap = {
                'lnkd.in': 'linkedin.com',
                'l.linkedin.com': 'linkedin.com',
                't.co': 'x.com',
                'l.facebook.com': 'facebook.com',
                'lm.facebook.com': 'facebook.com',
                'l.instagram.com': 'instagram.com',
              };
              var mapped = domainMap[refHost];
              if (mapped) {
                document.cookie =
                  'analytics_ref=' +
                  encodeURIComponent(mapped) +
                  ';path=/;max-age=300;SameSite=Lax';
              }
            } catch (e2) {}
          }
        } catch (e) {}
      })();
    </script>
